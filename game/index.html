<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THEODICY — a valley under gods</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap');
  body { background:#0c0a09; }
  .serif { font-family:'EB Garamond', Georgia, serif; }
  .mono  { font-family:'JetBrains Mono', ui-monospace, monospace; }
  .vignette { box-shadow: inset 0 0 140px 40px rgba(0,0,0,.75); }
  ::-webkit-scrollbar { width:6px } ::-webkit-scrollbar-thumb { background:#292524; border-radius:9px }
</style>
</head>
<body class="text-stone-300">
<div id="root"></div>

<script type="module">
import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
import htm from 'https://esm.sh/htm@3.1.1';
import { newWorld, stepTurn, PLAYER_ACTIONS, PANTHEON, DEITY_IDS, ranking } from './engine.js';
import { HeuristicGod, SupraGod, LiveLLMGod } from './gods.js';
import { valleyMapMarkup, sigilPath, portraitMarkup } from './scene.js';
import { LANGS, DEITY_I18N, ACTION_I18N, EVENT_I18N, OMEN_I18N, localizeLog, t } from './i18n.js';

const html = htm.bind(React.createElement);

const TONE = { amber:'text-amber-400', rose:'text-rose-400', emerald:'text-emerald-400', violet:'text-violet-400' };
const BG   = { amber:'bg-amber-950/40 border-amber-900/60', rose:'bg-rose-950/40 border-rose-900/60',
               emerald:'bg-emerald-950/40 border-emerald-900/60', violet:'bg-violet-950/40 border-violet-900/60' };
const RING = { amber:'ring-amber-500/60', rose:'ring-rose-500/60', emerald:'ring-emerald-500/60', violet:'ring-violet-500/60' };

// which gods a player action pleases (+) or angers (−) — mirrors applyPlayerAction in engine.js
const AFFINITY = {
  tend_well: { vurm: 1 },
  pay_debt:  { ithra: 1 },
  desecrate: { vurm: -1, kel: -1, oss: -1, ithra: -1 },
};

// ambient turn-events: variety + stakes, applied at the start of a turn (UI layer, so
// the arbiter/invariants stay untouched). cond gates them to sensible situations.
const EVENTS = [
  { text: 'A caravan passes and trades fairly.',        eff: (v) => { v.food += 3; v.morale += 3; } },
  { text: 'Rats are found in the granary.',             eff: (v) => { v.food = Math.max(0, v.food - 3); } },
  { text: 'A dry wind comes down off the ridge.',       eff: (v) => { v.water = Math.max(0, v.water - 2); } },
  { text: 'A child is born in the night.',              eff: (v) => { v.pop += 1; v.morale += 4; }, cond: (w) => w.village.food > 5 },
  { text: 'Old wounds fester; one does not wake.',      eff: (v) => { v.pop = Math.max(0, v.pop - 1); v.morale -= 5; }, cond: (w) => w.village.morale < 30 },
  { text: 'Strangers are counted at the treeline.',     eff: (v, w) => { w.bandits.strength += 1; w.tension = Math.min(100, w.tension + 8); } },
  { text: 'A clear night; the valley sleeps easy.',     eff: (v) => { v.morale += 6; } },
  { text: 'Someone leaves bread at the shrine.',        eff: (v, w) => { v.food += 2; w.sites.shrine.tended += 1; } },
];

// a deity's face: the painted portrait (avatars/<god>.png), falling back to the
// self-contained SVG portrait medallion if the image is ever missing.
function Face({ deity, size = 40, ring = true, dim = false }) {
  const [png, setPng] = useState(true);
  const d = PANTHEON[deity];
  return html`
    <div class=${'relative rounded-full overflow-hidden shrink-0 bg-black ' + (ring ? 'ring-1 ' + RING[d.color] : '') + (dim ? ' opacity-40' : '')}
         style=${{ width: size + 'px', height: size + 'px' }} title=${d.name}>
      ${png ? html`<img src=${'./avatars/' + deity + '.png'} onError=${() => setPng(false)} class="w-full h-full object-cover" alt=${d.name} />`
            : html`<div class="w-full h-full" dangerouslySetInnerHTML=${{ __html: portraitMarkup(deity) }}></div>`}
    </div>`;
}

// an omen's illustration — one scene per divine verb; silently absent if missing.
function OmenPic({ verb, className }) {
  const [ok, setOk] = useState(true);
  if (!verb || !ok) return null;
  return html`<img src=${'./omens/' + verb + '.png'} onError=${() => setOk(false)}
    class=${'object-cover rounded ' + (className || '')} alt="omen" loading="lazy" />`;
}

function theodicyRank(lang, f) {
  if (f >= 0.85) return t(lang,'r1');
  if (f >= 0.6)  return t(lang,'r2');
  if (f >= 0.35) return t(lang,'r3');
  return t(lang,'r4');
}

function Stat({ label, value, max = 20, danger, proj }) {
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  const showProj = proj !== undefined && proj !== value;
  const projBad = proj !== undefined && proj <= 0;
  return html`
    <div>
      <div class="flex justify-between text-[10px] uppercase tracking-widest text-stone-500 mono">
        <span>${label}</span>
        <span class=${danger ? 'text-rose-400' : 'text-stone-300'}>${value}${showProj ? html`<span class=${'ml-1 ' + (projBad ? 'text-rose-500' : 'text-stone-600')}>→ ${proj}</span>` : ''}</span>
      </div>
      <div class="h-1 bg-stone-800 mt-1 rounded-full overflow-hidden">
        <div class=${'h-full rounded-full ' + (danger ? 'bg-rose-600' : 'bg-stone-500')} style=${{ width: pct + '%' }}></div>
      </div>
    </div>`;
}

function App() {
  const [w, setW] = useState(() => newWorld());
  const [god, setGod] = useState(() => new HeuristicGod(Date.now() & 0xffff));
  const [backend, setBackend] = useState('heuristic');
  const [loading, setLoading] = useState(null);
  const [thinking, setThinking] = useState(false);
  const [showLedger, setShowLedger] = useState(false);
  const [modelId, setModelId] = useState('Luigi/supra-god-onnx');
  const [reads, setReads] = useState([]);        // {idx, guess, actual, correct}
  const [accused, setAccused] = useState(() => new Set());
  const [showIntro, setShowIntro] = useState(true);
  const [lang, setLang] = useState('en');
  const feedRef = useRef(null);
  const T = (k, v) => t(lang, k, v);
  const gName = (d) => (DEITY_I18N[lang] || DEITY_I18N.en)[d][0];
  const gDom = (d) => (DEITY_I18N[lang] || DEITY_I18N.en)[d][1];
  const aLabel = (k) => (ACTION_I18N[lang] || ACTION_I18N.en)[k][0];
  const aHint = (k) => (ACTION_I18N[lang] || ACTION_I18N.en)[k][1];
  const omenText = (o) => (lang === 'en' || !o.verb) ? o.text : ((OMEN_I18N[lang] || {})[o.verb] || o.text);
  const evEnIdx = Object.fromEntries(EVENT_I18N.en.map((s, i) => [s, i]));
  const locLine = (text) => lang === 'en' ? text : (text in evEnIdx ? (EVENT_I18N[lang][evEnIdx[text]] || text) : localizeLog(lang, text));

  useEffect(() => { feedRef.current?.scrollTo(0, 1e9); }, [w.omens.length, w.log.length]);

  function restart() {
    setW(newWorld()); setReads([]); setAccused(new Set()); setShowLedger(false);
  }

  async function act(action, deityArg) {
    if (w.over || thinking) return;
    setThinking(true);
    const next = structuredClone(w);
    // ambient event (variety + stakes) — UI layer, engine truth untouched
    if (next.turn > 1 && Math.random() < 0.32) {
      const pool = EVENTS.filter((e) => !e.cond || e.cond(next));
      const e = pool[Math.floor(Math.random() * pool.length)];
      if (e) { e.eff(next.village, next); next.log.push(e.text); }
    }
    await stepTurn(next, action, deityArg, god);
    setW(next);
    setThinking(false);
  }

  // accuse a god of the latest divine act — the inference made mechanical
  function accuse(idx, guess) {
    if (accused.has(idx)) return;
    const actual = w.ledger[idx].deity;
    setReads((r) => [...r, { idx, guess, actual, correct: guess === actual }]);
    setAccused((s) => new Set(s).add(idx));
  }
  const pendingIdx = w.ledger.length - 1;
  const pending = w.ledger.length && !accused.has(pendingIdx) ? w.ledger[pendingIdx] : null;
  const lastRead = reads.find((r) => r.idx === pendingIdx);
  const correctReads = reads.filter((r) => r.correct).length;

  async function enableSupra() {
    const g = new SupraGod(modelId, { dtype: 'q4', device: 'webgpu' });
    setLoading({ pct: 0, msg: 'requesting weights…' });
    try {
      await g.load((p) => {
        if (p.status === 'progress') setLoading({ pct: Math.round(p.progress || 0), msg: p.file || '' });
      });
      setGod(g); setBackend('supra'); setLoading(null);
    } catch (e) {
      setLoading({ pct: 0, msg: 'failed: ' + e.message + ' — staying on heuristic', err: true });
      setTimeout(() => setLoading(null), 6000);
    }
  }

  async function enableLive() {
    const g = new LiveLLMGod('http://localhost:8008');
    setLoading({ pct: 0, msg: 'reaching for the 0.8B on :8008…' });
    try {
      await g.load();
      setGod(g); setBackend('live'); setLoading(null);
    } catch (e) {
      setLoading({ pct: 0, msg: 'no god_server on :8008 — run game/god_server.py locally. staying on heuristic.', err: true });
      setTimeout(() => setLoading(null), 7000);
    }
  }

  const v = w.village;
  const rank = ranking(w);
  const feed = [...w.omens.map((o, i) => ({ ...o, verb: w.ledger[i]?.verb, kind: 'omen' })), ...w.log.map((t, i) => ({ turn: '', text: t, kind: 'log', i }))];
  const upkeepFood = Math.ceil(v.pop / 4);       // engine upkeep: food −ceil(pop/4), water −1 per turn
  const projFood = Math.max(0, v.food - upkeepFood);
  const projWater = Math.max(0, v.water - 1);
  const starving = projFood <= 0, thirsting = projWater <= 0;

  return html`
  <div class="min-h-screen vignette">
    ${showIntro && html`
      <div class="fixed inset-0 z-50 bg-black/85 backdrop-blur-sm grid place-items-center p-6" onClick=${() => setShowIntro(false)}>
        <div class="max-w-lg border border-stone-800 rounded-lg bg-stone-950 p-6" onClick=${(e) => e.stopPropagation()}>
          <h2 class="serif text-3xl text-stone-100 tracking-wide">THEODICY</h2>
          <p class="serif italic text-stone-500 text-sm mt-1">${T('introSub')}</p>
          <div class="mt-4 space-y-3 serif text-stone-300 text-[15px] leading-relaxed">
            <p dangerouslySetInnerHTML=${{ __html: T('introP1') }}></p>
            <p dangerouslySetInnerHTML=${{ __html: T('introP2') }}></p>
            <p class="text-stone-500 text-sm" dangerouslySetInnerHTML=${{ __html: T('introP3') }}></p>
          </div>
          <button onClick=${() => setShowIntro(false)} class="mt-5 mono text-xs px-4 py-2 rounded border border-stone-600 text-stone-200 hover:bg-stone-800">${T('introEnter')}</button>
        </div>
      </div>`}
    <div class="max-w-6xl mx-auto p-6">

      <header class="flex items-end justify-between border-b border-stone-800 pb-4 mb-6">
        <div>
          <h1 class="serif text-4xl text-stone-100 tracking-wide">THEODICY</h1>
          <p class="serif italic text-stone-500 text-sm mt-1">${T('tagline')}</p>
        </div>
        <div class="text-right mono text-xs">
          <div class="flex gap-1 justify-end mb-1">
            ${Object.entries(LANGS).map(([code, lbl]) => html`
              <button key=${code} onClick=${() => setLang(code)}
                class=${'px-1.5 py-0.5 rounded text-[10px] ' + (lang === code ? 'bg-stone-700 text-stone-100' : 'text-stone-600 hover:text-stone-300')}>${lbl}</button>`)}
          </div>
          <div class="text-stone-500">${T('turn')} <span class="text-stone-200">${w.turn}</span> / ${w.maxTurns}</div>
          <div class="mt-1 text-stone-600">${T('god')}: <span class=${backend === 'supra' ? 'text-violet-400' : backend === 'live' ? 'text-sky-400' : 'text-stone-400'}>${god.name}</span></div>
          <div class="mt-1 text-stone-600">${T('theodicy')}: <span class="text-amber-300">${correctReads}</span><span class="text-stone-700">/${reads.length} ${T('read')}</span></div>
          <a href="./world3d.html" class="inline-block mt-1 text-stone-600 hover:text-sky-400 border-b border-stone-800">walk the vale ▸ (3D)</a>
          <a href="./explore.html" class="inline-block mt-1 ml-2 text-stone-600 hover:text-emerald-400 border-b border-stone-800">(2D)</a>
          <a href="./rts.html" class="inline-block mt-1 ml-2 text-stone-600 hover:text-rose-400 border-b border-stone-800">${T('rts')}</a>
        </div>
      </header>

      <!-- ============ THE MAP — the valley, drawn ============ -->
      <div class="border border-stone-800 rounded-lg overflow-hidden mb-6 bg-black/40 relative">
        <div dangerouslySetInnerHTML=${{ __html: valleyMapMarkup(w, lang) }}></div>
        ${w.omens.length > 0 && html`
          <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/95 via-black/80 to-transparent px-6 pt-12 pb-4">
            <div class="flex items-end gap-4">
            <${OmenPic} verb=${w.ledger.at(-1)?.verb} className="w-32 h-24 shrink-0 ring-1 ring-stone-700 hidden sm:block" />
            <div class="flex-1">
            <p class="serif italic text-stone-100 text-lg leading-snug max-w-2xl">“${w.omens.at(-1).text}”</p>
            <div class="flex items-center gap-2.5 mt-2 flex-wrap">
              <span class="mono text-[9px] uppercase tracking-widest text-stone-500">${T('signTag',{t:w.omens.at(-1).turn})}</span>
              ${pending ? html`
                <span class="mono text-[9px] uppercase tracking-widest text-amber-300/80">${' '}${T('whose')}</span>
                ${DEITY_IDS.map((d) => html`
                  <button key=${d} onClick=${() => accuse(pendingIdx, d)} title=${'accuse ' + PANTHEON[d].name}
                    class="hover:scale-110 transition-transform"><${Face} deity=${d} size=${30} /></button>`)}
              ` : lastRead ? html`
                <${Face} deity=${lastRead.actual} size=${26} />
                <span class=${'mono text-[9px] uppercase tracking-widest ' + (lastRead.correct ? 'text-emerald-400' : 'text-rose-400')}>
                  ${lastRead.correct ? T('knew') : T('named',{g:gName(lastRead.guess)})} ${lastRead.correct ? '' : T('itWas',{g:gName(lastRead.actual)})}
                </span>` : ''}
            </div>
            </div>
            </div>
          </div>`}
      </div>

      <div class="grid grid-cols-12 gap-6">

        <!-- ============ THE VALLEY ============ -->
        <section class="col-span-3 space-y-4">
          <div class="border border-stone-800 rounded-lg p-4 bg-stone-950/60">
            <h2 class="mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-3">${T('hValley')}</h2>
            <div class="space-y-3">
              <${Stat} label=${T('souls')}   value=${v.pop}     max=${20} danger=${v.pop <= 4} />
              <${Stat} label=${T('food')}    value=${v.food}    max=${20} danger=${v.food <= 2} proj=${projFood} />
              <${Stat} label=${T('water')}   value=${v.water}   max=${15} danger=${v.water <= 2} proj=${projWater} />
              <${Stat} label=${T('morale')}  value=${v.morale}  max=${100} danger=${v.morale <= 25} />
              <${Stat} label=${T('defense')} value=${v.defense} max=${10} />
            </div>
            ${!w.over && (thirsting || starving) && html`
              <p class="mt-3 mono text-[9px] leading-relaxed text-rose-400">
                ${thirsting ? T('warnWater') : ''}${starving ? T('warnFood') : ''}
              </p>`}
            <p class="mt-2 mono text-[9px] text-stone-600">${T('upkeep',{f:upkeepFood})}</p>
            <div class="mt-4 pt-3 border-t border-stone-800 space-y-2 mono text-[11px]">
              <div class="flex justify-between"><span class="text-stone-600">${T('tension')}</span>
                <span class=${w.tension > 65 ? 'text-rose-400' : 'text-stone-400'}>${w.tension}</span></div>
              <div class="flex justify-between"><span class="text-stone-600">${T('bandits')}</span>
                <span class="text-stone-400">${w.bandits.strength}</span></div>
              <div class="flex justify-between"><span class="text-stone-600">${T('well')}</span>
                <span class=${w.sites.well.clean ? 'text-stone-400' : 'text-amber-400'}>${w.sites.well.clean ? T('tended') : T('fouled')}</span></div>
              <div class="flex justify-between"><span class="text-stone-600">${T('shrine')}</span>
                <span class=${w.sites.shrine.desecrated ? 'text-rose-400' : 'text-stone-400'}>${w.sites.shrine.desecrated ? T('broken') : T('standing')}</span></div>
              <div class="flex justify-between"><span class="text-stone-600">${T('debts')}</span>
                <span class=${w.debts.length ? 'text-violet-400' : 'text-stone-400'}>${w.debts.length}</span></div>
            </div>
          </div>

          <!-- model backend -->
          <div class="border border-stone-800 rounded-lg p-4 bg-stone-950/60">
            <h2 class="mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-3">${T('hMind')}</h2>
            ${backend === 'heuristic' ? html`
              <input class="w-full mono text-[10px] bg-stone-900 border border-stone-800 rounded px-2 py-1.5 mb-2 text-stone-400"
                     value=${modelId} onChange=${(e) => setModelId(e.target.value)} />
              <button onClick=${enableSupra} disabled=${!!loading}
                class="w-full mono text-[11px] px-3 py-2 rounded border border-violet-900 bg-violet-950/40 text-violet-300 hover:bg-violet-900/40 disabled:opacity-40 mb-1.5">
                ${loading ? `loading ${loading.pct}%` : T('summonSupra')}
              </button>
              <button onClick=${enableLive} disabled=${!!loading}
                class="w-full mono text-[11px] px-3 py-2 rounded border border-sky-900 bg-sky-950/40 text-sky-300 hover:bg-sky-900/40 disabled:opacity-40">
                ${T('summonLive')}
              </button>
              ${loading && html`<p class=${'mt-2 mono text-[9px] leading-relaxed ' + (loading.err ? 'text-rose-400' : 'text-stone-600')}>${loading.msg}</p>`}
              <p class="mt-2 serif italic text-[11px] text-stone-600 leading-snug">
                ${T('mindHeur')}
              </p>
            ` : backend === 'supra' ? html`
              <p class="mono text-[11px] text-violet-300">Supra-50M · q4 · webgpu</p>
              <p class="mt-2 serif italic text-[11px] text-stone-600 leading-snug">
                ${T('supraDesc')}
              </p>
            ` : html`
              <p class="mono text-[11px] text-sky-300">Qwen3.5-0.8B · live · localhost:8008</p>
              <p class="mt-2 serif italic text-[11px] text-stone-600 leading-snug">
                A real 0.8B LLM on the throne. World-blind, but the arbiter keeps it lawful.
                Capricious and lawful is what a god is.
              </p>
            `}
          </div>
        </section>

        <!-- ============ THE OMENS ============ -->
        <section class="col-span-6">
          <div class="border border-stone-800 rounded-lg bg-stone-950/60 h-[520px] flex flex-col">
            <div class="px-5 py-3 border-b border-stone-800 flex justify-between items-center">
              <h2 class="mono text-[10px] uppercase tracking-[0.2em] text-stone-500">${T('hSigns')}</h2>
              <button onClick=${() => setShowLedger(!showLedger)}
                class="mono text-[9px] uppercase tracking-widest text-stone-600 hover:text-stone-300">
                ${showLedger ? T('hideLedger') : T('readLedger')}
              </button>
            </div>

            <div ref=${feedRef} class="flex-1 overflow-y-auto px-5 py-4 space-y-3">
              ${w.turn === 1 && !w.omens.length && html`
                <p class="serif italic text-stone-600 text-sm leading-relaxed">
                  Twelve souls, a well, a shrine, and a treeline that has been quiet for too long.
                  Something is paying attention. Choose.
                </p>`}

              ${feed.map((f, i) => f.kind === 'omen' ? html`
                <div key=${'o' + i} class="flex gap-3 border-l-2 border-stone-700 pl-4 py-1">
                  ${f.verb && html`<${OmenPic} verb=${f.verb} className="w-24 h-16 shrink-0 mt-1 opacity-90 ring-1 ring-stone-800" />`}
                  <div>
                    <div class="mono text-[9px] text-stone-600 uppercase tracking-widest">${T('omenTag',{t:f.turn})}</div>
                    <p class="serif text-lg text-stone-200 italic leading-snug mt-0.5">${omenText(f)}</p>
                  </div>
                </div>
              ` : html`
                <p key=${'l' + i} class="serif text-sm text-stone-500 leading-snug">${locLine(f.text)}</p>
              `)}

              ${thinking && html`<p class="mono text-[10px] text-violet-500 animate-pulse">…something is deciding…</p>`}

              ${w.over && html`
                <div class=${'mt-4 p-4 rounded border ' + (w.won ? 'border-emerald-900 bg-emerald-950/30' : 'border-rose-900 bg-rose-950/30')}>
                  <p class=${'serif text-2xl ' + (w.won ? 'text-emerald-300' : 'text-rose-300')}>
                    ${w.won ? T('endures') : T('empty')}
                  </p>
                  <p class="serif italic text-sm text-stone-400 mt-1">
                    ${w.won ? T('held') : T('lastSoul')}
                  </p>
                  <div class="mt-3 pt-3 border-t border-stone-800/60">
                    <p class="mono text-[9px] uppercase tracking-widest text-stone-500">${T('scoreHead')}</p>
                    ${reads.length ? html`
                      <p class="serif text-xl text-amber-200 mt-1">${T('hands',{c:correctReads,n:reads.length})}
                        <span class="text-stone-500 text-sm">(${Math.round(100 * correctReads / reads.length)}%)</span></p>
                      <p class="serif italic text-sm text-stone-400 mt-0.5">${theodicyRank(lang, correctReads / reads.length)}</p>
                    ` : html`<p class="serif italic text-sm text-stone-500 mt-1">${T('never')}</p>`}
                  </div>
                  <button onClick=${restart}
                    class="mt-3 mono text-[11px] px-3 py-1.5 rounded border border-stone-700 text-stone-300 hover:bg-stone-800">
                    ${T('again')}
                  </button>
                </div>`}
            </div>

            <!-- ledger: the truth, normally hidden. THIS is the theodicy. -->
            ${showLedger && html`
              <div class="border-t border-stone-800 max-h-52 overflow-y-auto px-5 py-3 bg-black/40">
                <p class="mono text-[9px] uppercase tracking-widest text-stone-600 mb-2">
                  ${T('ledgerTitle')}
                </p>
                ${!w.ledger.length && html`<p class="serif italic text-stone-700 text-xs">${T('ledgerEmpty')}</p>`}
                ${w.ledger.slice().reverse().map((e, i) => html`
                  <div key=${i} class="mono text-[10px] py-1 flex gap-2 border-b border-stone-900">
                    <span class="text-stone-700 w-8">t${e.turn}</span>
                    <span class=${'w-32 ' + TONE[PANTHEON[e.deity].color]}>${gName(e.deity)}</span>
                    <span class="text-stone-400 w-16">${e.verb}</span>
                    <span class="text-stone-600 flex-1">${e.reason}</span>
                  </div>`)}
              </div>`}
          </div>
        </section>

        <!-- ============ ACTIONS + PANTHEON ============ -->
        <section class="col-span-3 space-y-4">
          <div class="border border-stone-800 rounded-lg p-4 bg-stone-950/60">
            <h2 class="mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-3">${T('hTurn')}</h2>
            <div class="space-y-1.5">
              ${Object.entries(PLAYER_ACTIONS).map(([k, a]) => html`
                <button key=${k} onClick=${() => act(k)} disabled=${w.over || thinking}
                  class=${'w-full text-left px-3 py-2 rounded border transition disabled:opacity-30 ' +
                    (k === 'desecrate'
                      ? 'border-rose-950 bg-rose-950/20 hover:bg-rose-900/30'
                      : 'border-stone-800 bg-stone-900/40 hover:bg-stone-800/60')}>
                  <div class=${'serif text-sm ' + (k === 'desecrate' ? 'text-rose-300' : 'text-stone-200')}>${aLabel(k)}</div>
                  <div class="mono text-[9px] text-stone-600 mt-0.5">${aHint(k)}</div>
                  ${AFFINITY[k] && html`<div class="flex gap-1.5 mt-1">
                    ${Object.entries(AFFINITY[k]).map(([d, s]) => html`
                      <span key=${d} class=${'mono text-[8px] ' + (s > 0 ? 'text-emerald-400' : 'text-rose-400')}>${s > 0 ? '+' : '−'}${gName(d)}</span>`)}
                  </div>`}
                </button>`)}
            </div>
          </div>

          <div class="border border-stone-800 rounded-lg p-4 bg-stone-950/60">
            <h2 class="mono text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-1">${T('hOffer')}</h2>
            <p class="serif italic text-[11px] text-stone-600 mb-3 leading-snug">
              ${T('offerSub')}
            </p>
            <div class="grid grid-cols-2 gap-1.5">
              ${DEITY_IDS.map((d) => html`
                <button key=${d} onClick=${() => act('offer', d)} disabled=${w.over || thinking}
                  class=${'px-2 py-2 rounded border text-left disabled:opacity-30 hover:brightness-125 flex items-center gap-2 ' + BG[PANTHEON[d].color]}>
                  <${Face} deity=${d} size=${34} />
                  <div class="min-w-0">
                    <div class=${'serif text-xs truncate ' + TONE[PANTHEON[d].color]}>${gName(d)}</div>
                    <div class="mono text-[8px] text-stone-500 mt-0.5">${T('favor')} ${w.favor[d]}</div>
                  </div>
                </button>`)}
            </div>
            ${w.over && html`
              <div class="mt-4 pt-3 border-t border-stone-800">
                <p class="mono text-[9px] uppercase tracking-widest text-stone-600 mb-2">${T('regard')}</p>
                ${rank.map((r) => html`
                  <div key=${r.deity} class="flex items-center gap-2 mono text-[10px] py-1">
                    <${Face} deity=${r.deity} size=${24} />
                    <span class=${'flex-1 ' + TONE[PANTHEON[r.deity].color]}>${gName(r.deity)}</span>
                    <span class="text-stone-500">${T('favor')} ${w.favor[r.deity]} · ${T('wrath')} ${r.anger.toFixed(0)}</span>
                  </div>`)}
              </div>`}
          </div>
        </section>
      </div>

      <footer class="mt-6 pt-4 border-t border-stone-800 serif italic text-xs text-stone-700 leading-relaxed">
        The engine owns all truth. The model owns only the choosing and the phrasing —
        it picks from a menu it cannot escape, and speaks in a voice it cannot control.
        You are trying to infer the nature of a mind from the pattern of your suffering.
        That is the whole game.
      </footer>
    </div>
  </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
