<!DOCTYPE html>
<html lang="en">
<head>

<title>THEODICY · 3D — the vale</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=JetBrains+Mono&display=swap');
  html,body{margin:0;height:100%;background:#0c0a09;overflow:hidden}

<body class="text-stone-300">
<!--
  world3d.html — the vale in 3D (three.js, CDN ES-modules, no build → CSP-safe).
  Walk in three dimensions (WASD / arrows), approach a god-site, press E to act.
  The four painted gods hover over their domains as billboards, glowing by wrath.
  Same engine.js truth; the god still just generates a lawful action.
-->
<div id="ui" class="fixed inset-0 pointer-events-none select-none"></div>
<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { FBXLoader } from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/FBXLoader.js';
import * as SkeletonUtils from 'https://esm.sh/three@0.160.0/examples/jsm/utils/SkeletonUtils.js';
import { newWorld, applyPlayerAction, upkeepTick, divineStrike, PANTHEON, DEITY_IDS, ranking } from './engine.js';
import { HeuristicGod, InstructGod } from './gods.js';

// ---- engine state (REAL-TIME: no turns; time flows, gods act on their own cadence) ----
let w = newWorld(), god = new HeuristicGod((Date.now() & 0xffff) || 1);
let godBackend = 'heuristic', godLoading = false, godPct = 0, godName = '';   // the divine mind: heuristic ↔ in-browser LLM
let dayT = 0, day = 1, divPool = 0, divBusy = false;   // day timer + divine cadence
const DAY_SECS = 13;                                    // real seconds per day of attrition

// ---- procedural audio: synthesized score + SFX (Web Audio, no files, CSP-safe) ----
const AUDIO = (() => {
  let ctx, master, muted = false, drone = [], mmode = 'explore';
  let tracks = {}, played = 0, failed = 0, droneOn = false;   // track els + load state
  // NOTE: music plays via PLAIN <audio> volume (not a MediaElementSource) — on the HF Space the
  // mp3s redirect to a cross-origin CDN, which taints Web-Audio-routed media to SILENCE. Direct
  // playback is CORS-immune. Only the synthesized SFX/bells/drone go through the Web Audio graph.
  const MVOL = 0.85;
  let mvol = {explore:0, combat:0}, mtarget = {explore:MVOL, combat:0}, musicTimer = 0;
  const now = () => ctx.currentTime;
  function ensure(){                                   // must be called from a user gesture
    if(!ctx){ try { ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ return; }
      master = ctx.createGain(); master.gain.value = 0; master.connect(ctx.destination);
      master.gain.linearRampToValueAtTime(muted?0:0.9, ctx.currentTime + 2.5);
      startMusic(); }
    if(ctx.state === 'suspended') ctx.resume();
    if(!muted) for(const k in tracks){ if(tracks[k].paused) tracks[k].play().catch(()=>{}); }  // retry autoplay-blocked stems on later gestures
  }
  function startMusic(){                               // two pre-generated tracks (Stable Audio), crossfaded by tension
    let built = 0;
    try {
      for(const name of ['explore','combat']){
        const el = new Audio('./music/'+name+'.mp3'); el.loop = true; el.preload = 'auto';
        el.volume = muted ? 0 : mvol[name];            // direct volume — NOT routed through Web Audio
        el.addEventListener('error', onTrackFail);     // 404 / decode / CSP fails ASYNC — caught here
        tracks[name] = el;
        el.play().then(()=>{ played++; }).catch(onTrackFail);
        built++;
      }
    } catch(e){ /* Audio unsupported — fall through to drone */ }
    if(built < 2) droneFallback();
    else { musicTimer = setInterval(fadeTick, 50); setTimeout(()=>{ if(played === 0) droneFallback(); }, 4000); }
    bells();                                            // sparse tolling either way
  }
  function fadeTick(){                                  // manual volume crossfade (Web-Audio ramps can't touch a plain <audio>)
    let settled = true;
    for(const k in tracks){ const d=mtarget[k]-mvol[k]; if(Math.abs(d)>0.002) settled=false;
      mvol[k] += d*0.09; try { tracks[k].volume = muted?0:Math.max(0,Math.min(1,mvol[k])); } catch(e){} }
    if(settled && musicTimer){ clearInterval(musicTimer); musicTimer=null; }   // stop ticking 20x/s once the crossfade has nowhere left to go
  }
  function onTrackFail(){ if(++failed >= 2) droneFallback(); }   // both stems dead → keep the air alive
  function setMode(m){                                  // 'explore' | 'combat' — retarget the crossfade
    if(m===mmode) return; mmode = m;
    mtarget.explore = (m==='explore') ? MVOL : 0.0; mtarget.combat = (m==='combat') ? MVOL : 0.0;
    if(!musicTimer && Object.keys(tracks).length) musicTimer = setInterval(fadeTick, 50);   // resume ticking for the new target
  }
  function droneFallback(){                             // a slow dark drone: root+fifth+octave through a moving lowpass
    if(droneOn || !ctx) return; droneOn = true;         // idempotent: only ever one drone, even if both callers fire
    const filt = ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=360; filt.Q.value=5; filt.connect(master);
    const lfo = ctx.createOscillator(), lg = ctx.createGain(); lfo.frequency.value=0.05; lg.gain.value=180; lfo.connect(lg); lg.connect(filt.frequency); lfo.start();
    for(const f of [55, 82.4, 110]){ const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=f; o.detune.value=Math.random()*8-4;
      const g=ctx.createGain(); g.gain.value=0.08; o.connect(g); g.connect(filt); o.start(); drone.push({o,g}); }
  }
  const SCALE=[0,3,5,7,10];
  function bells(){ if(ctx){ const s=SCALE[(Math.random()*SCALE.length)|0]+((Math.random()<0.4)?12:0); bell(220*Math.pow(2,s/12), now()+0.1, 0.05); }
    setTimeout(bells, 3200 + Math.random()*4500); }
  function bell(freq,t,gain){ if(!ctx) return; const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=freq;
    const g=ctx.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(gain,t+0.02); g.gain.exponentialRampToValueAtTime(0.0008,t+3);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+3.2); }
  function tone(freq,dur,type,gain,slide){ if(!ctx||muted) return; const t=now(); const o=ctx.createOscillator(); o.type=type; o.frequency.setValueAtTime(freq,t); if(slide)o.frequency.exponentialRampToValueAtTime(slide,t+dur);
    const g=ctx.createGain(); g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur); o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02); }
  function noise(dur,gain,hp){ if(!ctx||muted) return; const t=now(); const n=ctx.createBufferSource(); const buf=ctx.createBuffer(1,(ctx.sampleRate*dur)|0,ctx.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; n.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; const g=ctx.createGain(); g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur); n.connect(f); f.connect(g); g.connect(master); n.start(t); n.stop(t+dur); }
  const sfx = {
    attack: ()=>{ noise(0.1,0.16,1200); tone(200,0.09,'square',0.1,90); },
    hit:    ()=>{ tone(150,0.12,'triangle',0.2,60); noise(0.05,0.1,500); },
    cast:   (f=520)=>{ tone(f,0.5,'sine',0.16,f*2); tone(f*1.5,0.4,'sine',0.08); },
    level:  ()=>{ [0,4,7,12].forEach((s,i)=>setTimeout(()=>tone(440*Math.pow(2,s/12),0.4,'triangle',0.18),i*95)); },
    pickup: ()=>{ tone(880,0.14,'sine',0.13,1320); },
    omen:   ()=>{ tone(69,1.3,'sine',0.2); bell(207,now(),0.05); },
    death:  ()=>{ tone(220,1.1,'sawtooth',0.22,55); },
    boss:   ()=>{ tone(48,1.8,'sawtooth',0.28); [0,3,7].forEach((s,i)=>setTimeout(()=>tone(110*Math.pow(2,s/12),0.6,'square',0.13),i*150)); },
    victory:()=>{ [0,4,7,12,7,12].forEach((s,i)=>setTimeout(()=>tone(523*Math.pow(2,s/12),0.35,'triangle',0.16),i*110)); bell(1046,now()+0.7,0.1); },   // the fanfare a fallen champion deserves
  };
  function toggleMute(){ muted=!muted; if(master) master.gain.linearRampToValueAtTime(muted?0:0.9, now()+0.3);
    for(const k in tracks){ if(muted) tracks[k].pause(); else tracks[k].play().catch(()=>{}); } }  // stop decoding, not just silence
  return { ensure, sfx, setMode, toggleMute, muted:()=>muted, live:()=>!!ctx };
})();
const GODF = { vurm:392, kel:311, oss:523, ithra:466 };   // a cast pitch per god
let omen = null, pending = null, reads = [], busy = false, shrineMenu = false;

// ---- three.js scene ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0a09);
scene.fog = new THREE.Fog(0x0c0a09, 60, 240);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 1000);
// WebGLRenderer throws SYNCHRONOUSLY if the browser can't create a GL context at all (hardware
// acceleration disabled, GPU blocklisted/sandboxed, etc.) — a totally different failure from
// losing a context after it's been running (see the webglcontextlost handler below). Uncaught,
// this kills the whole module before a single line of UI ever renders: a silent black page with
// no explanation, matching exactly what "totally blank/black, no text at all" looks like.
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ antialias: true });
} catch (e) {
  console.error('WebGL context creation failed:', e);
  document.getElementById('ui').innerHTML = `<div class="fixed inset-0 bg-black grid place-items-center pointer-events-auto p-6"><div class="text-center max-w-lg">
    <p class="serif text-2xl text-stone-200 mb-2">This browser can't render the vale.</p>
    <p class="serif italic text-stone-500 text-sm mb-4">WebGL could not be created — usually because hardware acceleration is disabled, or your GPU is blocklisted/sandboxed by the browser. Try: turning on "Use hardware acceleration" in your browser's settings (then restart it), updating your graphics driver, or opening this page in a different browser.</p>
    <button onclick="location.reload()" class="mono text-sm px-4 py-2 rounded border border-stone-600 text-stone-200 hover:bg-stone-800">try again ▸</button>
  </div></div>`;
  throw e;   // nothing past this point can run without a renderer — stop here, message is already painted
}
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(2, devicePixelRatio));
document.body.appendChild(renderer.domElement);
renderer.domElement.tabIndex = 0;                        // focusable, so keys reach us even when embedded
addEventListener('resize', () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

// A GPU-process crash (a known Chromium risk when a WebGPU device is requested alongside an
// already-active WebGL context, e.g. by 'awaken the divine mind') is invisible to try/catch —
// it silently kills the canvas, leaving a permanently black page with no explanation. Catch it.
renderer.domElement.addEventListener('webglcontextlost', (e) => {
  e.preventDefault();
  contextLost = true;                                     // stop animate()/drawUI() from immediately overwriting this screen
  document.getElementById('ui').innerHTML = `<div class="fixed inset-0 bg-black grid place-items-center pointer-events-auto p-6"><div class="text-center max-w-md">
    <p class="serif text-2xl text-stone-200 mb-2">The vale flickers out.</p>
    <p class="serif italic text-stone-500 text-sm mb-4">Your browser's graphics context was lost — often triggered by 'awaken the divine mind' on some GPUs. Your progress was last autosaved a few seconds ago.</p>
    <button onclick="location.reload()" class="mono text-sm px-4 py-2 rounded border border-stone-600 text-stone-200 hover:bg-stone-800">reload ▸</button>
  </div></div>`;
}, false);

// ---- RTS click-to-move: left-click the ground to walk there; click a foe to attack-move ----
const _ray = new THREE.Raycaster(), _ndc = new THREE.Vector2(), _plane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
let moveTarget = null, attackTarget = null, atkTimer = 0, marker = null;
let dodgeCd = 0, dodgeT = 0; const dodgeDir = new THREE.Vector3(0,0,1);   // roll with i-frames
renderer.domElement.addEventListener('pointerdown', (e) => {
  if(e.button !== 0) return;                              // left button only
  AUDIO.ensure(); window.focus();                         // also grabs keyboard focus (fixes embedded "can't move")
  if(busy || w.over || !started) return;
  _ndc.x = (e.clientX/innerWidth)*2 - 1; _ndc.y = -(e.clientY/innerHeight)*2 + 1;
  _ray.setFromCamera(_ndc, camera);
  const p = new THREE.Vector3();
  if(!_ray.ray.intersectPlane(_plane, p)) return;
  p.x = THREE.MathUtils.clamp(p.x,-95,95); p.z = THREE.MathUtils.clamp(p.z,-90,90);
  const foe = enemies.find(f => !f.dying && Math.hypot(f.mesh.position.x-p.x, f.mesh.position.z-p.z) < 3.6);
  if(foe){ attackTarget = foe; moveTarget = null; } else { moveTarget = {x:p.x, z:p.z}; attackTarget = null; }
  if(!marker){ marker = new THREE.Mesh(new THREE.RingGeometry(1.0,1.5,22), new THREE.MeshBasicMaterial({transparent:true, side:THREE.DoubleSide})); marker.rotation.x=-Math.PI/2; scene.add(marker); }
  marker.material.color.setHex(foe?0xfb7185:0xa78bfa); marker.position.set(p.x,0.25,p.z); marker.visible=true; marker.userData.t=1;
});

scene.add(new THREE.HemisphereLight(0x8899bb, 0x1a1410, 0.55));
const key = new THREE.DirectionalLight(0xffd9a8, 1.0); key.position.set(-40, 60, 20); scene.add(key);
const ember = new THREE.PointLight(0xff5533, 0.0, 220); ember.position.set(30, 30, -60); scene.add(ember); // grows with tension

// ground — a mottled moor texture (canvas noise), not a flat color plane
function groundTexture(){
  const cv=document.createElement('canvas'); cv.width=256; cv.height=256; const x=cv.getContext('2d');
  x.fillStyle='#1a2418'; x.fillRect(0,0,256,256);
  for(let i=0;i<2600;i++){                                // grass/dirt mottling in the same dusk palette
    const r=Math.random();
    x.fillStyle = r<0.45?'rgba(34,48,28,0.5)' : r<0.75?'rgba(20,28,18,0.55)' : r<0.92?'rgba(44,54,32,0.35)' : 'rgba(58,48,30,0.3)';
    const s=1+Math.random()*3;
    x.fillRect(Math.random()*256, Math.random()*256, s, s*(0.5+Math.random()));
  }
  const tex=new THREE.CanvasTexture(cv); tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(26,26); return tex;
}
const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400),
  new THREE.MeshStandardMaterial({ map: groundTexture(), roughness: 1 }));
ground.rotation.x = -Math.PI/2; scene.add(ground);
// river (a flat ribbon)
const river = new THREE.Mesh(new THREE.PlaneGeometry(220, 8),
  new THREE.MeshStandardMaterial({ color: 0x24557d, roughness: 0.4, metalness: 0.2 }));
river.rotation.x = -Math.PI/2; river.rotation.z = 0.5; river.position.set(-10, 0.1, 10); scene.add(river);
// northern ridge — rock cones with a stone face (not featureless black), scree at the feet
for (let i=0;i<9;i++){ const h=14+Math.random()*16; const c=new THREE.Mesh(new THREE.ConeGeometry(10+Math.random()*8, h, 6),
  new THREE.MeshStandardMaterial({ color: 0x241c14, roughness:1, flatShading:true })); c.position.set(-90+i*22, h/2-1, -95+Math.random()*10); scene.add(c);
  const cap=new THREE.Mesh(new THREE.ConeGeometry(2.4+Math.random()*1.6, h*0.24, 6), new THREE.MeshStandardMaterial({color:0x4a4238, roughness:1, flatShading:true}));
  cap.position.set(c.position.x, h-1-h*0.11, c.position.z); scene.add(cap);   // bare stone crown where the tree line gives out
  for(let r=0;r<3;r++){ const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(0.9+Math.random()*1.4,0), new THREE.MeshStandardMaterial({color:0x2e261c,roughness:1,flatShading:true}));
    rock.position.set(c.position.x+(Math.random()*16-8), 0.6, c.position.z+8+Math.random()*6); rock.rotation.set(Math.random(),Math.random(),Math.random()); scene.add(rock); } }
// ---- THE ASHFIELDS: a second region past the ridge — Kel's country, where the raiders come from ----
const ash = new THREE.Mesh(new THREE.CircleGeometry(120, 32),
  new THREE.MeshStandardMaterial({ color: 0x241611, roughness: 1 })); ash.rotation.x=-Math.PI/2; ash.position.set(10,0.02,-165); scene.add(ash);
for (let i=0;i<6;i++){ const bx=10+(Math.random()*100-50), bz=-115-Math.random()*90;   // bone-white scatter
  const bone=new THREE.Mesh(new THREE.SphereGeometry(1.1+Math.random(),6,6), new THREE.MeshStandardMaterial({color:0xd8cfc0,roughness:1})); bone.position.set(bx,0.8,bz); scene.add(bone); }

// ---- god-sites ----
const SITES = {
  well:    { pos:[-55, 0, 12],  deity:'vurm',  name:'The Thirsting Well', act:{action:'tend_well'}, label:'draw & tend the water' },
  fields:  { pos:[-8, 0, 45],   deity:null,    name:'The Fields',         act:{action:'harvest'},   label:'harvest' },
  village: { pos:[8, 0, 8],     deity:null,    name:'Aldermere',          act:{action:'rest'},      label:'rest the village' },
  wall:    { pos:[42, 0, -6],   deity:null,    name:'The Palisade',       act:{action:'fortify'},   label:'fortify' },
  ridge:   { pos:[36, 0, -70],  deity:'kel',   name:'The Grudge Ridge',   act:{action:'harvest'},   label:'watch the treeline' },
  shrine:  { pos:[70, 0, 40],   deity:'ithra', name:'The Ledger Shrine',  shrine:true,              label:'offer, settle, desecrate' },
  warcamp: { pos:[10, 0, -165], deity:'kel',   name:"Kel's Warcamp",      act:{action:'fortify', warcamp:true}, label:'stand at the dead fires — pay Kel his due' },
};
const tex = new THREE.TextureLoader();
const billboards = {};
for (const [id, s] of Object.entries(SITES)) {
  const grp = new THREE.Group(); grp.position.set(s.pos[0], 0, s.pos[2]); scene.add(grp); s.grp = grp;
  // landmark base
  if (id==='well'){ const ring=new THREE.Mesh(new THREE.CylinderGeometry(3,3,2,16), new THREE.MeshStandardMaterial({color:0x3f3f46})); ring.position.y=1; grp.add(ring); const water=new THREE.Mesh(new THREE.CylinderGeometry(2.2,2.2,0.3,16), new THREE.MeshStandardMaterial({color:0x3b82c4,emissive:0x0a2a44})); water.position.y=2; grp.add(water); s.water=water; }
  else if (id==='village'){
    const wallTex=(()=>{ const cv=document.createElement('canvas'); cv.width=64; cv.height=64; const x=cv.getContext('2d');
      x.fillStyle='#2a2320'; x.fillRect(0,0,64,64); x.strokeStyle='rgba(0,0,0,0.35)'; x.lineWidth=2;
      for(let p=8;p<64;p+=12){ x.beginPath(); x.moveTo(0,p); x.lineTo(64,p); x.stroke(); }   // plank seams
      x.strokeStyle='rgba(94,74,52,0.25)'; for(let p=3;p<64;p+=6){ x.beginPath(); x.moveTo(0,p); x.lineTo(64,p); x.stroke(); }
      const t=new THREE.CanvasTexture(cv); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t; })();
    const thatchTex=(()=>{ const cv=document.createElement('canvas'); cv.width=64; cv.height=64; const x=cv.getContext('2d');
      x.fillStyle='#3a2c22'; x.fillRect(0,0,64,64);
      for(let i=0;i<220;i++){ x.strokeStyle=Math.random()<0.5?'rgba(66,50,34,0.6)':'rgba(28,20,14,0.5)'; x.lineWidth=1;
        const px=Math.random()*64, py=Math.random()*64; x.beginPath(); x.moveTo(px,py); x.lineTo(px+Math.random()*2-1, py+4+Math.random()*5); x.stroke(); }   // hanging straw
      const t=new THREE.CanvasTexture(cv); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t; })();
    for(let i=0;i<5;i++){const a=i/5*6.28;
      const hut=new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshStandardMaterial({map:wallTex,roughness:1})); hut.position.set(Math.cos(a)*5,1.5,Math.sin(a)*5); grp.add(hut);
      const roof=new THREE.Mesh(new THREE.ConeGeometry(2.9,2.4,4), new THREE.MeshStandardMaterial({map:thatchTex,roughness:1,flatShading:true})); roof.position.set(Math.cos(a)*5,4.2,Math.sin(a)*5); roof.rotation.y=0.78; grp.add(roof);
      const door=new THREE.Mesh(new THREE.PlaneGeometry(0.9,1.7), new THREE.MeshStandardMaterial({color:0x17110c,roughness:1})); const da=a+Math.PI;   // doors face the village center
      door.position.set(Math.cos(a)*5+Math.sin(da)*-1.52, 0.85, Math.sin(a)*5+Math.cos(da)*-1.52); door.rotation.y=da; grp.add(door);
      const glowW=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.5), new THREE.MeshStandardMaterial({color:0x9a5a1e,emissive:0xd97416,emissiveIntensity:0.8}));   // a lamplit window
      glowW.position.set(Math.cos(a)*5+Math.sin(da+1.7)*-1.52, 1.8, Math.sin(a)*5+Math.cos(da+1.7)*-1.52); glowW.rotation.y=da+1.7; grp.add(glowW);
    }
    const hearth=new THREE.PointLight(0xd97416, 0.9, 26); hearth.position.set(0,3,0); grp.add(hearth);   // warm village heart against the dusk
  }
  else if (id==='fields'){ for(let i=0;i<4;i++){const f=new THREE.Mesh(new THREE.BoxGeometry(3,0.4,7), new THREE.MeshStandardMaterial({color:0x3f6b2a})); f.position.set(-6+i*4,0.2,0); grp.add(f);} s.fieldGrp=grp; }
  else if (id==='wall'){ for(let i=0;i<8;i++){const p=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,4), new THREE.MeshStandardMaterial({color:0x5b4636})); p.position.set(-7+i*2,2,0); grp.add(p);} }
  else if (id==='ridge'){ s.fireGrp=new THREE.Group(); grp.add(s.fireGrp); }
  else if (id==='warcamp'){                             // Kel's camp: always-lit fires, war banners, a ring of tents
    for(let i=0;i<5;i++){ const a=i/5*6.28, fr=8; const fire=new THREE.Mesh(new THREE.ConeGeometry(0.9,2.6,6), new THREE.MeshStandardMaterial({color:0xf97316,emissive:0xf97316})); fire.position.set(Math.cos(a)*fr,1.3,Math.sin(a)*fr); grp.add(fire);
      const tent=new THREE.Mesh(new THREE.ConeGeometry(2.4,3.4,4), new THREE.MeshStandardMaterial({color:0x2a1c18,roughness:1})); tent.position.set(Math.cos(a)*(fr+6),1.7,Math.sin(a)*(fr+6)); tent.rotation.y=a; grp.add(tent); }

function killNPC(){ const doomed=NPCS.filter(n=>n.alive && n.id!=='harl'); if(!doomed.length) return;   // the vale's collapse takes the vale's folk — the exile in the ash isn't among them
  doomed.sort((a,b)=> (a.state==='done'?1:0)-(b.state==='done'?1:0));   // the unhelped fall first
  const n=doomed[0]; n.alive=false; if(n.mesh&&n.mesh.parent) scene.remove(n.mesh); if(npcMenu&&npcMenu.id===n.id) npcMenu=null;
  const pi=party.indexOf(n); if(pi>=0) party.splice(pi,1);   // a fallen ally leaves the party
  lostFolk.push(n.name); w.village.morale=Math.max(0,w.village.morale-4); toast=`${n.name} — ${t('lost to the vale.')}`; toastT=4; AUDIO.sfx.death(); }

// ---- THE PARTY: fulfil a folk's charge and they take up arms — each with a god-themed role ----
const party = [];
const ALLY = {
  maren: { hp:80,  role:'douse', cd:5.0 },   // Vurm: slows nearby foes + a little water-mending
  oda:   { hp:65,  role:'mend',  cd:6.0 },   // Oss: heals the hero and the party
  bran:  { hp:130, role:'blade', cd:1.0, dmg:15 },   // Kel: wades in, melee
  sela:  { hp:75,  role:'smite', cd:3.2, dmg:24 },   // Ithra: judgement at range
  harl:  { hp:110, role:'blade', cd:1.3, dmg:12 },   // an ex-soldier of the warband — fights, but the edge has gone off him
};
// allies scale with the HERO's level (same curve as enemy hp: *(1+level*0.1)) so they never fall
// behind the fight they're helping you win — a static ally would become dead weight by lv8+.
function allyMaxHp(id){ return Math.round(ALLY[id].hp*(1+level*0.1)); }
function allyDmg(id){ return Math.round((ALLY[id].dmg||0)*(1+level*0.1)); }
function rescaleParty(){                              // called on hero level-up: grow allies, keep their hp ratio
  for(const n of party){ if(!n.alive) continue; const frac = n.maxHp>0 ? n.hp/n.maxHp : 1;
    n.maxHp = allyMaxHp(n.id); n.hp = Math.round(n.maxHp*frac); } }
function recruit(n){ if(n.ally) return; n.ally=true; n.maxHp=allyMaxHp(n.id); n.hp=n.maxHp; n.downed=0; n.cd=ALLY[n.id].cd; n.level=Math.max(1,level); party.push(n);
  toast=`${n.name} ${t('takes up arms at your side')} (Lv ${n.level}).`; toastT=3.5; }
function nearestEnemyTo(x,z,maxD){ let best=null,bd=maxD*maxD; for(const e of enemies){ if(e.dying||e.hp<=0)continue; const dx=e.mesh.position.x-x,dz=e.mesh.position.z-z,dd=dx*dx+dz*dz; if(dd<bd){bd=dd;best=e;} } return best; }
function updateParty(dt){
  const foes = enemies.filter(e=>!e.dying&&e.hp>0);
  party.forEach((n,idx)=>{
    if(!n.alive) return;
    const a=ALLY[n.id], dmg=allyDmg(n.id), healScale=1+level*0.05;
    n.level = level;                                   // an ally always fights at the hero's current level
    if(n.downed>0){ n.downed-=dt; n.mesh.position.y=0.3; n.mesh.rotation.z=1.4;   // lie fallen until revived
      if(n.downed<=0 || !foes.length){ n.downed=0; n.hp=n.maxHp*0.5; n.mesh.rotation.z=0; } return; }
    const ang = hero.rotation.y + Math.PI + (idx-1.5)*0.5;                 // a slot behind the hero
    let tx = hero.position.x + Math.sin(ang)*7, tz = hero.position.z + Math.cos(ang)*7, engaging=false;
    const tgt = nearestEnemyTo(n.mesh.position.x, n.mesh.position.z, 34);
    if(tgt && a.role==='blade'){ tx=tgt.mesh.position.x; tz=tgt.mesh.position.z; engaging=true; }
    const dx=tx-n.mesh.position.x, dz=tz-n.mesh.position.z, d=Math.hypot(dx,dz), spd=(a.role==='blade'?22:16);
    const partyMoving = d>(engaging?3.5:1.5);
    if(partyMoving){ n.mesh.position.x+=dx/d*spd*dt; n.mesh.position.z+=dz/d*spd*dt; n.mesh.rotation.y=Math.atan2(dx,dz); }
    if(n.char) n.char.setMoving(partyMoving);
    n.cd -= dt;
    if(n.cd<=0){
      if(a.role==='blade'){ if(tgt && d<=4.2){ tgt.hp-=dmg; tgt.hit=0.15; addHit(tgt.mesh.position,dmg); n.cd=a.cd; } else n.cd=0.2; }
      else if(a.role==='smite'){ if(tgt){ tgt.hp-=dmg; tgt.hit=0.15; addHit(tgt.mesh.position,dmg); AUDIO.sfx.cast(466); n.cd=a.cd; } else n.cd=0.4; }
      else if(a.role==='mend'){ const heal=Math.round(16*healScale); heroHp=Math.min(heroMax,heroHp+heal); party.forEach(p=>{ if(!p.downed) p.hp=Math.min(p.maxHp,p.hp+Math.round(10*healScale)); }); n.cd=a.cd; }
      else if(a.role==='douse'){ let hit=false; for(const e of foes){ if(Math.hypot(e.mesh.position.x-n.mesh.position.x,e.mesh.position.z-n.mesh.position.z)<20){ e.slow=3; hit=true; } } heroHp=Math.min(heroMax,heroHp+Math.round(6*healScale)); n.cd = hit?a.cd:1; }
    }
    for(const e of foes){ if(Math.hypot(e.mesh.position.x-n.mesh.position.x,e.mesh.position.z-n.mesh.position.z) < e.r+2.2){ n.hp -= e.dmg*0.5*dt; } }   // chip damage
    if(n.hp<=0){ n.hp=0; n.downed=relicHas('reviveHalf')?4:8; toast=`${n.name} — ${t('downed!')}`; toastT=2; AUDIO.sfx.hit(); }
    else if(!foes.length && n.hp<n.maxHp) n.hp=Math.min(n.maxHp, n.hp+8*dt);   // regen out of fight
  });
}

// ---- trees: a trunk + two stacked, color-jittered foliage tiers reads as a fir, not a traffic cone ----
function plantTree(x, z, s=1){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.26*s,0.38*s,2.6*s,6), new THREE.MeshStandardMaterial({color:0x2a1c12,roughness:1}));
  trunk.position.y=1.3*s; g.add(trunk);
  const shade=0x122016 + (Math.floor(Math.random()*3)*0x040804);   // per-tree green jitter
  const lo=new THREE.Mesh(new THREE.ConeGeometry((1.9+Math.random()*0.7)*s, 3.6*s, 7), new THREE.MeshStandardMaterial({color:shade,roughness:1,flatShading:true}));
  lo.position.y=3.4*s; g.add(lo);
  const hi=new THREE.Mesh(new THREE.ConeGeometry((1.2+Math.random()*0.4)*s, 2.6*s, 7), new THREE.MeshStandardMaterial({color:shade+0x030603,roughness:1,flatShading:true}));
  hi.position.y=5.3*s; g.add(hi);
  g.position.set(x,0,z); g.rotation.y=Math.random()*6.28; scene.add(g); return g;
}
// western forest
for (let i=0;i<40;i++) plantTree(-95+Math.random()*30, 20+Math.random()*70, 0.9+Math.random()*0.5);
// scattered vale trees — kept to the margins so they never block the site-to-site walking lanes
for (const [tx,tz] of [[-20,60],[-32,55],[30,55],[42,48],[55,60],[-15,-30],[-28,-42],[60,-20],[68,-32],[75,10],[-45,-15],[24,30]])
  plantTree(tx+Math.random()*4-2, tz+Math.random()*4-2, 0.8+Math.random()*0.5);

    "We stood the ridge together for six years. Good man, then. Something happened up past the treeline — I still don't fully know what, he wouldn't say, and I didn't push hard enough while there was still time to push. When he came back changed, I told myself it would pass. It didn't.":"Nous avons tenu la crête ensemble pendant six ans. Un homme bon, alors. Quelque chose s'est passé au-delà de la lisière — je ne sais toujours pas vraiment quoi, il refusait de le dire, et je n'ai pas insisté assez tant qu'il était encore temps d'insister. Quand il est revenu changé, je me suis dit que ça passerait. Ce n'est pas passé.",
    "Older than Aldermere itself, they say — the vale was named around it, not the other way. Ithra doesn't ask for worship here, just an honest accounting. Some days that feels harder to give than worship would be.":"Plus ancien qu'Aldremère elle-même, dit-on — le val fut nommé autour de lui, et non l'inverse. Ithra n'exige pas de culte ici, seulement un compte honnête. Certains jours, cela semble plus difficile à donner qu'un culte ne le serait.",
    "People hear 'judgement' and think punishment. Ithra's colder than that and, I think, fairer for it. The ledger doesn't care if you meant well. It cares if the debt is paid. I used to find that terrifying. Now I find it almost restful.":"Les gens entendent « jugement » et pensent châtiment. Ithra est plus froide que cela et, je crois, plus juste pour cela. Le registre se moque de vos bonnes intentions. Il se soucie que la dette soit payée. Autrefois, je trouvais cela terrifiant. Maintenant, je trouve cela presque reposant.",
    "Because I owe Ithra a debt of my own, from before I came to this vale, and this is how I've chosen to carry it — in the open, where I can't pretend it isn't there.":"Parce que je dois moi-même une dette à Ithra, depuis avant mon arrivée dans ce val, et c'est ainsi que j'ai choisi de la porter — au grand jour, là où je ne peux prétendre qu'elle n'existe pas.",
    "She nods, quiet a moment. \"Most people say something like that and move on. Thank you for not moving on quite so fast.\"":"Elle acquiesce, silencieuse un instant. « La plupart des gens disent quelque chose comme ça et passent à autre chose. Merci de ne pas être passé(e) si vite. »",
    "A short, dry laugh. \"Vurm would agree with you. That's either a comfort or a warning — I've never worked out which.\"":"Un rire bref et sec. « Vurm serait d'accord avec vous. C'est soit un réconfort, soit un avertissement — je n'ai jamais su lequel. »",
    "Her jaw tightens. \"Maybe. But I have a son to raise, and vengeance is a poor thing to raise him on. Careful whose ledger you're settling.\"":"Sa mâchoire se crispe. « Peut-être. Mais j'ai un fils à élever, et la vengeance est une piètre chose sur laquelle l'élever. Prenez garde au registre que vous réglez. »",
    "\"It closes a little more every year he grows. That's the only mending I've found that actually holds.\" She almost smiles.":"« Elle se referme un peu plus chaque année qu'il grandit. C'est la seule guérison que j'aie trouvée qui tienne vraiment. » Elle esquisse presque un sourire.",
    "He's quiet a long moment. \"A raid went wrong. Someone he was supposed to save, he didn't. That's all I have — he never gave me more, and I stopped asking before I lost him twice.\" His voice has gone flat.":"Il reste silencieux un long moment. « Un raid a mal tourné. Quelqu'un qu'il devait sauver, il ne l'a pas sauvé. C'est tout ce que j'ai — il ne m'en a jamais dit plus, et j'ai cessé de demander avant de le perdre une seconde fois. » Sa voix s'est faite plate.",
    "Something in his shoulders eases. \"Most people push. Thank you for not being most people.\"":"Quelque chose se détend dans ses épaules. « La plupart des gens insistent. Merci de ne pas être la plupart des gens. »",
    "\"Someone I loved was dying. I bargained for time I hadn't earned. I got it — and I've been paying for it, honestly, ever since. I don't regret the bargain. I regret that I'd make it again.\" She says it plainly, like a debt already reckoned.":"« Quelqu'un que j'aimais était mourant. J'ai marchandé un temps que je n'avais pas mérité. Je l'ai obtenu — et je le paie honnêtement depuis. Je ne regrette pas le marché. Je regrette de savoir que je le referais. » Elle le dit simplement, comme une dette déjà réglée.",
    "\"Most people ask anyway.\" A faint, real smile. \"Thank you for the exception.\"":"« La plupart des gens demandent quand même. » Un sourire faible mais sincère. « Merci pour l'exception. »",
    "Cleanse the Thirsting Well  [tend it]":"Purifiez le Puits Assoiffé  [entretenez-le]",
    "Bring the village respite  [rest Aldermere, or Mend]":"Apportez du répit au village  [reposez Aldremère, ou Guérison]",
    "Break the ridge-raiders  [slay 4]":"Brisez les pillards de la crête  [tuez-en 4]",
    "Read a god's hand truly  [name one omen right]":"Lisez avec justesse la main d'un dieu  [nommez un présage correctement]",
    "Then the water remembers you kindly. I always knew it would be Vurm.":"Alors l'eau se souviendra de vous avec bienveillance. J'ai toujours su que ce serait Vurm.",
    "Not Vurm? …well. The well will keep regardless. I hope you chose well.":"Pas Vurm ? …bien. Le puits continuera malgré tout. J'espère que vous avez bien choisi.",
    "Oss, then. My boy will grow up gentler for it. Thank you.":"Oss, alors. Mon garçon en grandira plus doux. Merci.",
    "Not Oss… I understand. Mercy isn't the only shield a home needs.":"Pas Oss… je comprends. La miséricorde n'est pas le seul bouclier dont un foyer a besoin.",
    "Kel, then. Good. The ridge respects nothing else — and neither did Kaine, in the end.":"Kel, alors. Bien. La crête ne respecte rien d'autre — et Kaine non plus, à la fin.",
    "Not Kel… softer choice. I hope it holds when the next blade comes down from the ridge.":"Pas Kel… un choix plus doux. J'espère qu'il tiendra quand la prochaine lame descendra de la crête.",
    "Ithra keeps the ledger balanced. A fitting hand to trust — the debts are yours to weigh now.":"Ithra tient le registre en équilibre. Une main digne de confiance — les dettes sont désormais les vôtres à peser.",

    "The stores are fuller than you filled them.":"Les réserves sont plus pleines que vous ne les avez remplies.",
    "A gift, unsigned, and heavy.":"Un don, non signé, et lourd.",
    "The grain you did not count is gone.":"Le grain que vous n'avez pas compté a disparu.",
    "A price is taken. You were not asked.":"Un prix est prélevé. On ne vous a pas demandé.",
    "The ledger closes a line.":"Le grand livre clôt une ligne.",

    "The shape of an intent, briefly, and then not.":"La forme d'une intention, un instant, puis plus rien.",
    "You wake knowing something you did not learn.":"Vous vous réveillez en sachant une chose que vous n'avez pas apprise.",
    "You knelt to Vurm. The well runs clear and the fields drink deep — Aldermere blooms in a mercy that asks nothing back.":"Vous vous êtes agenouillé devant Vurm. Le puits coule clair et les champs boivent à leur soif — Aldremère fleurit dans une clémence qui ne demande rien en retour.",
    "You earned Kel's respect the only way he grants it — in blood. The ridge is yours; no raider dares test the vale.":"Vous avez gagné le respect de Kel de la seule manière qu'il accorde — dans le sang. La crête est vôtre ; aucun pillard n'ose éprouver le val.",
    "You took Oss's hand. What the gods broke, you mend — the vale learns to forgive even heaven.":"Vous avez pris la main d'Oss. Ce que les dieux ont brisé, vous le réparez — le val apprend à pardonner jusqu'au ciel.",
    "You chose Ithra. Judgement falls clean and cold; the vale is ordered, lawful, and a little afraid.":"Vous avez choisi Ithra. Le jugement tombe, net et froid ; le val est ordonné, respectueux des lois, et un peu effrayé.",

    "Aldermere starved before you could name a god to save it.":"Aldremère est morte de faim avant que vous ne puissiez nommer un dieu pour la sauver.",
    "You had crossed blades with Kaine twice before he stopped running. The third time, he did not.":"Vous aviez croisé le fer avec Kaine deux fois avant qu'il ne cesse de fuir. La troisième, il n'a pas fui.",
    "You had met the Ashen Wolf once, and let him go. He did not return the courtesy — but this time, neither did you.":"Vous aviez rencontré le Loup de Cendre une fois, et l'aviez laissé partir. Il ne vous a pas rendu la courtoisie — mais cette fois, vous non plus.",
    "A stranger called himself Kaine, and made his last stand where the ridge meets the vale.":"Un étranger se disait Kaine, et livra son dernier combat là où la crête rejoint le val.",

    "The Vale of Aldermere":"Le Val d'Aldremère",
    "The Ashfields":"Les Champs de Cendre",
    "A Sign Made Real":"Un Signe Devenu Réel",
    "You cross past the ridge into Kel's country — ash, bone, and the cold smoke of old camps.":"Vous franchissez la crête vers le pays de Kel — cendre, os, et la fumée froide des vieux camps.",
    "the deserter":"le déserteur",
    "Put the dead fires to rest  [stand at Kel's warcamp]":"Apaisez les feux éteints  [tenez-vous au camp de guerre de Kel]",
    "You crossed the ridge to find bones, and found me. I rode with the Wolf once. There's an oath of mine still smouldering in that camp south of here — stand at the dead fires and let it go out.":"Vous avez franchi la crête pour trouver des ossements, et vous m'avez trouvé. J'ai chevauché avec le Loup, autrefois. Un serment à moi couve encore dans ce camp au sud — tenez-vous aux feux éteints et laissez-le s'éteindre.",
    "The fires are south, where the banners lean. Stand there, so the oath hears you.":"Les feux sont au sud, là où penchent les bannières. Tenez-vous y, que le serment vous entende.",
    "It's quiet now. First quiet I've had since I threw down the spear. Thank you, stranger.":"C'est calme, maintenant. Le premier calme depuis que j'ai jeté la lance. Merci, étranger.",
    "Kel is moving. I know the sound — get back over the ridge, or stand very still.":"Kel se met en marche. Je connais ce bruit — repassez la crête, ou ne bougez plus du tout.",
    "So you've crossed the Wolf and lived. He was the best of us, and the worst thing that ever happened to us.":"Alors vous avez croisé le Loup et survécu. Il était le meilleur d'entre nous, et la pire chose qui nous soit arrivée.",
    "Ask what happened here":"Demander ce qui s'est passé ici",
    "Ask about riding with Kaine":"L'interroger sur sa chevauchée avec Kaine",
    "Ask why he stays in the ash":"Demander pourquoi il reste dans la cendre",
    "\"Come down to Aldermere. Ash is no home.\"":"« Descendez à Aldremère. La cendre n'est pas un foyer. »",
    "\"Keep them well. Someone should.\"":"« Gardez-les bien. Quelqu'un le doit. »",
    "This was pasture once, before the camps. We burned it ourselves — a warband eats a valley faster than any army it fights. When there was nothing left to burn, the Wolf pointed us at yours.":"C'était un pâturage, avant les camps. Nous l'avons brûlé nous-mêmes — une bande de guerre dévore une vallée plus vite que n'importe quelle armée qu'elle combat. Quand il n'est plus rien resté à brûler, le Loup nous a pointés vers la vôtre.",
    "He never slept the night before a raid. We thought it was nerves. It was arithmetic — he'd count what the burning would buy, and whether it was worth what it cost us. The night the count came out wrong, I left.":"Il ne dormait jamais la nuit avant un raid. Nous pensions que c'étaient les nerfs. C'était de l'arithmétique — il comptait ce que l'incendie rapporterait, et si cela valait ce que cela nous coûtait. La nuit où le compte est tombé faux, je suis parti.",
    "Because the vale won't have me, and the warband would have me back. Out here, nobody asks. I keep the graves — there are more of ours in this ash than you'd think.":"Parce que le val ne veut pas de moi, et que la bande me reprendrait. Ici, personne ne demande rien. Je garde les tombes — il y a plus des nôtres dans cette cendre que vous ne croyez.",
    "He looks south a long time. \"Maybe. When the graves are kept — somebody has to know where they lie. After that, maybe.\"":"Il regarde longtemps vers le sud. « Peut-être. Quand les tombes seront gardées — quelqu'un doit savoir où elles reposent. Après cela, peut-être. »",
    "\"That's the first time anyone's called it work worth doing.\" He straightens a little. \"Kel counts the dead too, you know. Someone ought to count them kindly.\"":"« C'est la première fois qu'on appelle cela un travail qui vaut la peine. » Il se redresse un peu. « Kel compte les morts aussi, vous savez. Quelqu'un devrait les compter avec bonté. »",
    "So you gave Kel your hand. He'll hold it to something, one day — he always collects.":"Alors vous avez donné votre main à Kel. Il la tiendra à quelque chose, un jour — il finit toujours par encaisser.",
    "Not Kel. Good. Whatever they promise up that ridge, it costs double.":"Pas Kel. Bien. Quoi qu'ils promettent là-haut sur la crête, cela coûte le double.",
    "speak the deserter's count":"dire le compte du déserteur",
    "The Count Comes Out Wrong":"Le Compte Tombe Faux",
    "\"Harl keeps your graves, Kaine. He counted you among the living.\" The greatsword wavers — and lowers.":"« Harl garde vos tombes, Kaine. Il t'a compté parmi les vivants. » L'épée à deux mains vacille — puis s'abaisse.",
    "You spoke the deserter's count, and the Wolf lowered his blade. He walked back into the ash — to keep the graves, with Harl.":"Vous avez dit le compte du déserteur, et le Loup a baissé sa lame. Il est retourné dans la cendre — garder les tombes, avec Harl.",
    "Kel's champion falls — the ridge holds its breath.":"Le champion de Kel tombe — la crête retient son souffle.",

    "draw & tend the water":"汲水並照看",
    "harvest":"收成",
    "rest the village":"讓村莊歇息",
    "fortify":"加固",
    "watch the treeline":"守望林線",
    "offer, settle, desecrate":"獻祭、清償、褻瀆",
    "stand at the dead fires — pay Kel his due":"立於熄滅的營火前——償還凱爾應得之債",
    "the well-keeper":"守井人",
    "a young mother":"年輕的母親",
    "the watchman":"守望者",
    "the shrine-tender":"神龕守護者",
    "The well tastes of copper and old grudge. Vurm counts every cup we drew untended. Cleanse it, and I will rest easier.":"井水嚐起來有銅鏽與陳年怨懟的味道。弗爾姆記著我們每一次未加照看便汲取的水。淨化它，我才能安心。",
    "My boy hasn't woken clear-eyed in days. If Oss still leans kind, let the village rest a while.":"我的孩子已經好幾天沒能清醒地醒來了。若歐斯仍傾向仁慈，就讓村莊歇息一陣吧。",
    "Kel is not prayed away, only met. Cut down four of his dogs and the ridge learns fear.":"凱爾無法靠祈禱打發，只能靠正面相對。斬殺四隻他的獵犬，山脊便會學會恐懼。",
    "Ithra keeps a ledger, and so must you. When the next omen comes, name whose hand it was — truly.":"伊斯拉持有一本帳冊，你也必須如此。當下一個徵兆降臨時，如實指出那是哪位神明之手。",
    "Still it runs foul. Please — draw the cover, clear the silt.":"它仍舊污濁。求你——掀開井蓋，清去淤泥。",
    "He is weaker today. We need respite — rest us, or a mending hand.":"他今天更虛弱了。我們需要喘息——讓我們歇息，或施以療癒之手。",
    "Fewer than four still breathe up there. Keep at it.":"山上尚存活的不到四隻了。繼續。",
    "The signs still puzzle you. Watch closer; name the next one right.":"這些徵兆仍令你困惑。仔細觀察，正確指出下一個。",
    "The water runs clear again. Bless your hands. Vurm is quiet… for now.":"水又變清澈了。願你的雙手蒙福。弗爾姆暫時平靜下來了……眼下是如此。",
    "He smiled this morning. Oss’s mercy moves through you. Thank you.":"他今早笑了。歐斯的慈悲透過你流轉。謝謝你。",
    "Four cold on the slope. Kel respects a blade that answers. Well fought.":"四具屍身冷臥於坡上。凱爾敬重應戰之刃。打得漂亮。",
    "You saw the hand behind the sign. Ithra marks you as one who reckons true.":"你看穿了徵兆背後的手。伊斯拉將你標記為能如實判斷之人。",
    "The well sours as we speak — go, before the children drink!":"此刻井水正在變質——快去，趁孩子們還沒喝下它！",
    "Everyone is afraid. Steady us — we cannot hold if hope goes.":"所有人都害怕了。安定我們——若希望消散，我們將無法支撐下去。",
    "They are coming NOW — meet them, quickly!":"他們現在就要來了——快去迎戰！",
    "A judgement comes. Read it rightly, or we answer a debt not ours.":"審判將至。如實解讀它，否則我們將背負一筆不屬於我們的債。",
    "The Ashen Wolf, twice now. I know that blade-work — I taught it to him, once. Finish what I couldn't.":"灰燼之狼，這已是第二次了。我認得那套劍法——是我曾經教他的。完成我未能完成之事。",
    "Ask about Aldermere":"詢問亞德莫爾",
    "Ask about Vurm":"詢問弗爾姆",
    "Ask why she tends it so fiercely":"詢問她為何如此執著地照看此井",
    "\"I'm sorry. That's a heavy thing to carry.\"":"「我很遺憾。那是一副沉重的擔子。」",
    "\"The vale needs the water more than it needs grief.\"":"「這座幽谷需要的是水，而非哀傷。」",
    "Ask about her son":"詢問她的兒子",
    "Ask why she trusts mercy over strength":"詢問她為何信賴慈悲勝於力量",
    "Ask what happened to her husband":"詢問她丈夫發生了什麼事",
    "\"Kel will answer for that, one day.\"":"「凱爾終有一天會為此付出代價。」",
    "\"I'm sorry. That's an old wound, still open.\"":"「我很遺憾。那是道尚未癒合的舊傷。」",
    "Ask what he watches for":"詢問他在守望什麼",
    "Ask what Kel is to him":"詢問凱爾對他而言意味著什麼",
    "Ask him about Kaine":"向他詢問凱恩的事",
    "Press him — what really happened?":"追問他——究竟發生了什麼事？",
    "Let it go — some things aren't yours to know.":"就此打住——有些事並非你該知道的。",
    "Ask about the shrine":"詢問神龕的事",
    "Ask her view on judgement":"詢問她對審判的看法",
    "Ask why she tends the shrine herself":"詢問她為何親自照看神龕",
    "\"What did you bargain for?\"":"「你當初交易換來的是什麼？」",
    "\"That's yours to carry. I won't pry.\"":"「那是你該獨自背負的。我不會追問。」",
    "Before the souring, this was a green place — full nights, fat harvests. I don't remember when the water first turned. Only that we stopped trusting it, and started tending it instead. That's most of what a vale is, in the end: what you keep tending after you stop trusting it.":"在酸腐降臨之前，這裡是一片翠綠之地——夜夜豐盈，年年豐收。我不記得井水是何時開始變質的。只記得我們不再信任它，轉而開始照看它。說到底，一座幽谷多半便是如此：當你不再信任某樣事物後，仍持續照看它。",
    "Vurm doesn't punish you the way Kel does — loud, then over. Vurm just... withholds. Quietly, for years, until you notice the well tastes wrong and you can't remember when it started. I've made my peace with a god like that. Mostly.":"弗爾姆懲罰人的方式與凱爾不同——凱爾轟然而至，轉瞬即逝。弗爾姆只是……悄悄地扣留。靜默無聲，經年累月，直到你察覺井水的味道不對，卻已想不起是從何時開始的。我已與這樣的神明和解了。大致上如此。",
    "My mother drew water from this well the winter it first soured, and didn't know. She was gone within the month. I was young enough that I only remember the SHAPE of losing her, not the reasons. I tend the well because nobody tended it for her.":"我母親在這口井第一次變質的那個冬天取了水，渾然不知。不到一個月，她便離世了。我當時年紀尚小，只記得失去她的「形狀」，卻記不清緣由。我照看這口井，是因為當年沒有人為她照看它。",
    "He asks me sometimes why the vale is sick. I don't have a good answer that isn't frightening, so I tell him the gods are arguing and we're waiting for them to finish. He seems to accept that better than I do.":"他有時會問我，為什麼幽谷病了。我沒有一個不嚇人的好答案，於是告訴他諸神正在爭執，我們在等他們吵完。他似乎比我更能接受這個說法。",
    "I've seen what strength costs, up close. Mercy is slower and it doesn't always feel like winning. But it's the only thing I've seen that doesn't ask you to bury someone to prove it worked.":"我曾近距離見識過力量的代價。慈悲較為緩慢，也不總讓人感覺像是勝利。但那是我所見過，唯一不需要你埋葬某人才能證明其奏效的東西。",
    "He went up to the ridge with the watch, three winters back, when the raids were bad. He didn't come back down. Bran was there. He doesn't talk about it and I don't make him.":"三個冬天前，劫掠猖獗之時，他隨守衛隊上了山脊。他沒有再下來。布蘭當時也在場。他不談這件事，我也不勉強他。",
    "Smoke that isn't ours. Birds that go quiet wrong. Most nights it's nothing — a fox, the wind. I stay anyway. The one night it isn't nothing is the only night that matters, and you don't get to pick which one that is.":"不屬於我們的炊煙。異樣沉寂下來的鳥鳴。大多數夜裡什麼都沒有——一隻狐狸，一陣風。我還是留下來守著。唯有「什麼都有」的那一夜才真正要緊，而你無從選擇是哪一夜。",
    "Not a friend. Not quite an enemy either. Kel is the reason I'm still standing on this ridge instead of lying on it. I don't love him for that. But I don't forget it.":"不是朋友。也稱不上是敵人。凱爾是我至今仍站在這道山脊上，而非倒臥其中的原因。我不會因此而愛戴他。但我也不會忘記這一點。",
    "We stood the ridge together for six years. Good man, then. Something happened up past the treeline — I still don't fully know what, he wouldn't say, and I didn't push hard enough while there was still time to push. When he came back changed, I told myself it would pass. It didn't.":"我們一起守衛這道山脊六年了。那時他是個好人。林線之外發生了些什麼——我至今仍不完全清楚，他不肯說，而在還來得及追問的時候，我又沒有問得夠深。當他變了個人回來時，我告訴自己這只是一時的。結果並非如此。",
    "Older than Aldermere itself, they say — the vale was named around it, not the other way. Ithra doesn't ask for worship here, just an honest accounting. Some days that feels harder to give than worship would be.":"據說它比亞德莫爾本身還要古老——這座幽谷是圍繞著它命名的，而非反過來。伊斯拉在此不要求信眾崇拜，只求誠實的交代。有些日子，這比崇拜還難以給予。",
    "People hear 'judgement' and think punishment. Ithra's colder than that and, I think, fairer for it. The ledger doesn't care if you meant well. It cares if the debt is paid. I used to find that terrifying. Now I find it almost restful.":"人們聽到「審判」便聯想到懲罰。伊斯拉比那更為冷靜，我認為，也因此更為公正。帳冊不在乎你是否出於善意。它在乎的是債是否已還清。我曾經覺得這很可怕。如今卻覺得這近乎令人安心。",
    "Because I owe Ithra a debt of my own, from before I came to this vale, and this is how I've chosen to carry it — in the open, where I can't pretend it isn't there.":"因為在我來到這座幽谷之前，我便已欠下伊斯拉一筆屬於自己的債，而這是我選擇背負它的方式——攤在陽光下，讓我無法假裝它不存在。",
    "She nods, quiet a moment. \"Most people say something like that and move on. Thank you for not moving on quite so fast.\"":"她點點頭，沉默片刻。「大多數人說了這種話便轉身離去。謝謝你沒有那麼快就離開。」",
    "A short, dry laugh. \"Vurm would agree with you. That's either a comfort or a warning — I've never worked out which.\"":"她發出一聲短促而乾澀的笑。「弗爾姆會贊同你的。那究竟是種安慰，還是種警告——我始終沒弄明白。」",
    "Her jaw tightens. \"Maybe. But I have a son to raise, and vengeance is a poor thing to raise him on. Careful whose ledger you're settling.\"":"她咬緊了牙關。「或許吧。但我還有個兒子要撫養，而復仇是種糟糕的養育方式。小心你在清算的是誰的帳。」",
    "\"It closes a little more every year he grows. That's the only mending I've found that actually holds.\" She almost smiles.":"「隨著他一年年長大，傷口也一點點癒合。那是我找到唯一真正有效的療法。」她幾乎笑了出來。",
    "He's quiet a long moment. \"A raid went wrong. Someone he was supposed to save, he didn't. That's all I have — he never gave me more, and I stopped asking before I lost him twice.\" His voice has gone flat.":"他沉默了許久。「一次劫掠出了差錯。有個他本該救下的人，他沒能救成。這就是我所知道的一切——他從未告訴我更多，而在我第二次失去他之前，我便不再追問了。」他的語氣已歸於平淡。",
    "Something in his shoulders eases. \"Most people push. Thank you for not being most people.\"":"他的肩膀似乎放鬆了些。「大多數人都會追問。謝謝你不是大多數人。」",
    "\"Someone I loved was dying. I bargained for time I hadn't earned. I got it — and I've been paying for it, honestly, ever since. I don't regret the bargain. I regret that I'd make it again.\" She says it plainly, like a debt already reckoned.":"「我所愛之人當時將死。我交易換來了我未曾掙得的時間。我得到了它——而從那時起，我便一直老實地償還著。我不後悔這筆交易。我後悔的是，若重來一次，我還是會做同樣的選擇。」她說得平靜，彷彿那是一筆早已清算完畢的債。",
    "\"Most people ask anyway.\" A faint, real smile. \"Thank you for the exception.\"":"「大多數人還是會問。」一抹淺淺卻真切的微笑。「謝謝你是個例外。」",
    "Cleanse the Thirsting Well  [tend it]":"淨化渴井  [照看它]",
    "Bring the village respite  [rest Aldermere, or Mend]":"為村莊帶來喘息  [讓亞德莫爾歇息，或使用療癒]",
    "Break the ridge-raiders  [slay 4]":"擊潰山脊掠奪者  [誅殺 4 名]",
    "Read a god's hand truly  [name one omen right]":"如實解讀神明之手  [正確指出一個徵兆]",
    "Then the water remembers you kindly. I always knew it would be Vurm.":"那麼水將溫柔地記住你。我早就知道會是弗爾姆。",
    "Not Vurm? …well. The well will keep regardless. I hope you chose well.":"不是弗爾姆？……好吧。井水終究會留存下去。希望你選對了。",
    "Oss, then. My boy will grow up gentler for it. Thank you.":"那麼，歐斯。我的孩子將因此成長得更加溫柔。謝謝你。",
    "Not Oss… I understand. Mercy isn't the only shield a home needs.":"不是歐斯……我明白。慈悲並非一個家所需要的唯一屏障。",
    "Kel, then. Good. The ridge respects nothing else — and neither did Kaine, in the end.":"那麼，凱爾。很好。山脊不敬重其他任何東西——到頭來，凱恩也是如此。",
    "Not Kel… softer choice. I hope it holds when the next blade comes down from the ridge.":"不是凱爾……較為溫和的選擇。希望當下一柄劍從山脊降下時，它能撐得住。",
    "Ithra keeps the ledger balanced. A fitting hand to trust — the debts are yours to weigh now.":"伊斯拉使帳冊保持平衡。一雙值得信賴的手——如今權衡債務之責在你了。",
    "Not Ithra? The ledger will still be kept — just not by the hand you chose.":"不是伊斯拉？帳冊仍將被記錄——只是不再經由你所選擇的那雙手。",
    "Charge taken —":"已接下囑託——",
    "charge fulfilled, the vale takes heart.":"囑託已完成，幽谷重燃希望。",
    "lost to the vale.":"殞落於幽谷。",
    "takes up arms at your side":"在你身側持械而戰",
    "downed!":"倒下了！",
    "answered.":"已回應。",
    "takes note.":"已記下此事。",
    "Oss stays the ruin.":"歐斯遏止了毀滅。",

    "The shrine comes apart under your hands. Every god remembers this.":"神龕在你手中崩解。每一位神明都將記住此事。",

    "The stream runs thin and tastes of rust.":"溪水變得細瘦，嚐起來有鏽味。",
    "Dew does not come. The stones stay dry.":"露水不再降下。石頭始終乾涸。",
    "Buckets come up half, then less.":"打上來的水桶只有半滿，然後更少。",
    "A pale film sits on the water at dawn.":"黎明時分，水面浮著一層蒼白的薄膜。",
    "The dog drinks, then will not rise.":"狗喝了水，便再也站不起來。",
    "Something has died upstream, and knows it.":"上游有什麼死了，而且它自己知道。",
    "Rain in a season that has none.":"無雨的季節裡下起了雨。",
    "The lower field is a brown mirror.":"下方的田地成了一面棕色的鏡子。",
    "Water where water has never been.":"水出現在從未有水的地方。",
    "Smoke on the ridge, and no one lit it.":"山脊上有煙，卻無人點火。",
    "The dogs face the treeline and do not bark.":"狗群面向林線，卻不吠叫。",
    "Hoofprints in the barley, turning back.":"麥田裡的蹄印，掉頭而去。",
    "Someone has been selling iron on the road.":"有人在路上兜售鐵器。",
    "Fires on the ridge, more than last week.":"山脊上的火，比上週更多了。",
    "A stranger counted your gate and left.":"一個陌生人數過你的門，然後離開了。",
    "A gate was found open. No one opened it.":"有扇門被發現敞開著。沒有人開過它。",
    "The watchman will not meet your eye.":"守望者不敢與你對視。",
    "Rope cut from the inside.":"繩索是從裡面割斷的。",
    "A child who was sick is not.":"生病的孩子痊癒了。",
    "The roof holds through the night.":"屋頂撐過了整夜。",
    "Someone is singing in the mill again.":"磨坊裡又有人唱起歌來。",
    "The wind turns at the palisade and goes around.":"風在柵欄前轉向，繞行而過。",
    "The wall settles as if pressed.":"牆彷彿被一隻手按實了。",
    "You sleep, and nothing comes.":"你睡去，什麼也沒有來。",
    "A week passes and nothing happens. It is unbearable.":"一週過去，什麼都沒發生。這令人難以忍受。",
    "The sky is only sky.":"天空只是天空。",
    "For nine days, no sign at all.":"九天過去，毫無徵兆。",
    "A stranger leaves grain at the gate and asks nothing. Yet.":"一個陌生人在門前留下穀糧，什麼也不要。暫時如此。",
    "The stores are fuller than you filled them.":"糧倉比你裝滿時還要充盈。",
    "A gift, unsigned, and heavy.":"一份禮物，無人署名，而且沉重。",
    "The grain you did not count is gone.":"你未曾清點的穀糧不見了。",
    "A price is taken. You were not asked.":"代價已被取走。無人問過你。",
    "The ledger closes a line.":"帳冊闔上了一行。",
    "A dream, very clear, of who is angry.":"一個夢，無比清晰，夢見誰在憤怒。",
    "The shape of an intent, briefly, and then not.":"一個意圖的輪廓，一瞬即逝。",
    "You wake knowing something you did not learn.":"你醒來時知曉了一件你從未學過的事。",
    "You knelt to Vurm. The well runs clear and the fields drink deep — Aldermere blooms in a mercy that asks nothing back.":"你向弗爾姆屈膝。井水清澈，田野暢飲——亞德莫爾在一份不求回報的仁慈中繁盛。",
    "You earned Kel's respect the only way he grants it — in blood. The ridge is yours; no raider dares test the vale.":"你以凱爾唯一認可的方式贏得了他的敬重——以血。山脊屬於你；再無掠奪者膽敢試探幽谷。",
    "You took Oss's hand. What the gods broke, you mend — the vale learns to forgive even heaven.":"你握住了歐斯之手。諸神所毀壞的，由你修補——幽谷學會了寬恕，甚至寬恕上天。",
    "You chose Ithra. Judgement falls clean and cold; the vale is ordered, lawful, and a little afraid.":"你選擇了伊斯拉。審判乾淨而冷冽地降下；幽谷秩序井然、恪守律法，也帶著一絲畏懼。",

function checkPortent(act){
  if(godBackend!=='supra' || !act.omen) return;            // only the awakened model's OWN words can trigger this
  if(clock.elapsedTime - lastPortentT < 15) return;         // a real event, not background noise
  const text = act.omen.toLowerCase();
  for(const th of PORTENT_THEMES){ if(th.re.test(text)){
    lastPortentT = clock.elapsedTime; const line = th.apply();

// ---- divine manifestations: when a god ACTS, the world SHOWS it. This is Theodicy's summon-
// spectacle — the act was always real (ledger, crisis, tension); now it is also visible.
// Each deity manifests at its own seat: Vurm rains over the well, Kel's embers rise off the
// ridge, Oss's motes lift from the village, Ithra's judgement descends as a column at the shrine.
const manifests = [];
const GOD_SEAT = { vurm:'well', kel:'ridge', oss:'village', ithra:'shrine' };
const GOD_HUE  = { vurm:0x3b82f6, kel:0xef4444, oss:0xfbbf24, ithra:0xa78bfa };
function manifestGod(god){
  const pos = SITES[GOD_SEAT[god]].pos, color = GOD_HUE[god];
  const N=170, geo=new THREE.BufferGeometry(), arr=new Float32Array(N*3);
  for(let i=0;i<N;i++){ arr[i*3]=pos[0]+(Math.random()*34-17); arr[i*3+1]=Math.random()*24+6; arr[i*3+2]=pos[2]+(Math.random()*34-17); }
  geo.setAttribute('position', new THREE.BufferAttribute(arr,3));
  const pts=new THREE.Points(geo, new THREE.PointsMaterial({color, size:0.55, transparent:true, opacity:0.95, depthWrite:false}));
  scene.add(pts);
  const light=new THREE.PointLight(color, 3.2, 110); light.position.set(pos[0], 22, pos[2]); scene.add(light);
  let beam=null;
  if(god==='ithra'){ beam=new THREE.Mesh(new THREE.CylinderGeometry(2.2,3.2,60,12,1,true),
    new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.28, side:THREE.DoubleSide, depthWrite:false}));
    beam.position.set(pos[0],30,pos[2]); scene.add(beam); }
  const vy = god==='oss' ? 7 : god==='kel' ? 5 : -11;     // mercy and war-embers RISE; water and the rest fall
  manifests.push({ t:0, dur:4.5, update(dt){
    this.t+=dt; const p=geo.attributes.position.array;
    for(let i=0;i<N;i++){ p[i*3+1]+=vy*dt; if(vy<0&&p[i*3+1]<0.4)p[i*3+1]=26; if(vy>0&&p[i*3+1]>28)p[i*3+1]=4; }
    geo.attributes.position.needsUpdate=true;
    const k=Math.min(1,this.t/this.dur);
    pts.material.opacity=0.95*(1-k*k); light.intensity=3.2*(1-k);
    if(beam){ beam.material.opacity=0.28*(1-k); beam.rotation.y+=dt*0.8; }
    if(this.t>=this.dur){ scene.remove(pts); scene.remove(light); if(beam) scene.remove(beam); return false; }
    return true; } });
}

function recomputeStats(){                            // base (level) + every equipped relic's delta, applied together

   ${!npcMenu&&!shrineMenu&&near&&!busy&&!w.over?`<div class="absolute left-1/2 bottom-24 -translate-x-1/2 text-center"><button data-act="interact" class="pointer-events-auto mono text-xs px-3 py-1.5 rounded-full bg-black/70 border border-stone-700 text-stone-200">${near.type==='npc'?`[E] ${t('speak with')} <span class="text-stone-100">${near.npc.name}</span> <span class="text-stone-500">· ${t(near.npc.role)}</span>${near.npc.state==='active'?' <span class="text-amber-400">◆</span>':near.npc.state==='done'?' <span class="text-emerald-400">✓</span>':''}`:`[E] ${t(near.s.label)} — <span class="text-stone-500">${t(near.s.name)}</span>`}</button></div>`:''}
   ${TOUCH&&started&&!w.over&&!busy?`<div class="absolute right-3 bottom-4 flex flex-col gap-2 items-center">
     <button data-act="dodge" class="pointer-events-auto w-14 h-14 rounded-full border border-stone-600 bg-black/60 text-stone-200 text-xl grid place-items-center active:bg-stone-800">↷</button>
     <button data-act="strike" class="pointer-events-auto w-[4.5rem] h-[4.5rem] rounded-full border border-rose-800 bg-black/60 text-rose-200 text-3xl grid place-items-center active:bg-rose-950">⚔</button>
   </div>`:''}
   ${!npcMenu&&!near&&!w.over&&day<3?`<div class="absolute left-1/2 bottom-28 -translate-x-1/2 mono text-[10px] text-stone-600">${t('seek the named folk of Aldermere')}</div>`:''}
   ${!started?`<div class="absolute inset-0 grid place-items-center bg-black/90 pointer-events-auto"><div class="text-center max-w-2xl px-6">
     <p class="serif text-5xl text-stone-100 tracking-[0.2em]">${t('THEODICY')}</p>
     <p class="serif italic text-stone-400 mt-2">${t('Aldermere lies under four gods. They act on it, unbidden; you endure — and answer.')}</p>
     <div class="flex gap-2 justify-center mt-3">${[['en','EN'],['fr','FR'],['zh','繁中']].map(([code,label])=>`<button data-act="lang:${code}" class="pointer-events-auto mono text-[9px] px-2 py-0.5 rounded border ${LANG===code?'border-amber-600 text-amber-300':'border-stone-800 text-stone-600 hover:text-stone-300'}">${label}</button>`).join('')}</div>
     ${saveAvailable?`<div class="mt-5 mb-1"><button data-act="resume" class="pointer-events-auto text-left w-80 max-w-full mx-auto block p-3 rounded-lg border border-amber-700/60 bg-amber-950/20 hover:bg-amber-950/40"><div class="mono text-xs text-amber-300">◆ ${t('resume your tale')} <span class="text-stone-500">[Enter]</span></div><div class="serif italic text-[12px] text-stone-400 mt-0.5">Lv ${saveAvailable.level} · ${t('day')} ${saveAvailable.day} · ${GNAME(saveAvailable.calling)}${t("'s calling")}${saveAvailable.covenant?` · ${t('pledged to')} ${GNAME(saveAvailable.covenant)}`:''}</div></button></div><p class="mono text-[9px] text-stone-600 mb-1">${t('— or begin a new tale —')}</p>`:''}
     <p class="mono text-[11px] uppercase tracking-[0.3em] text-amber-400 mt-3 mb-3">${t('whom do you revere?')}&nbsp;&nbsp;[1–4]</p>
     <div class="flex flex-wrap gap-3 justify-center">${DEITY_IDS.map((d,i)=>`<button data-act="call:${d}" class="pointer-events-auto text-left w-52 p-3 rounded-lg border hover:bg-stone-900" style="border-color:${GODC[d]}66"><div class="mono text-xs mb-1" style="color:${GODC[d]}"><b class="text-amber-300">${i+1}</b> ${GNAME(d)} <span class="text-stone-500">· ${POWERS[CALLINGS[d].power].name}</span></div><div class="serif italic text-[12px] text-stone-400 leading-snug">${t(CALLINGS[d].blurb)}</div></button>`).join('')}</div>
     <p class="mono text-[9px] text-stone-600 mt-6">${t('left-click move · SPACE strike · SHIFT roll · Q/R/F/V powers · E act · K chronicle')}</p>
     <button data-act="mind" class="pointer-events-auto mono text-[10px] mt-4 px-3 py-1.5 rounded border ${godBackend==='supra'?'border-violet-700 text-violet-300':'border-stone-700 text-stone-500 hover:text-stone-300'}">${godLoading?`◍ waking ${godName}… ${godPct}%`:(godBackend==='supra'?`◈ the divine mind is awake (${godName})`:'◇ awaken the divine mind — a real LLM becomes the god (Qwen2.5-0.5B on WebGPU, ~480MB; else SmolLM2-360M)')}</button>
   </div></div>`:''}
   ${covenantOpen&&!w.over?`<div class="absolute inset-0 grid place-items-center bg-black/85 pointer-events-auto"><div class="text-center max-w-xl px-6"><p class="mono text-[10px] uppercase tracking-[0.35em] text-amber-400">${t('The Covenant')}</p><p class="serif text-3xl text-stone-100 mt-3 mb-1">${t('You have proven devotion. Pledge.')}</p><p class="serif italic text-stone-500 mb-5">${t('Your patron grants their power — and their rival rises to test your oath.')}</p><div class="flex flex-wrap gap-2 justify-center">${DEITY_IDS.map((d,i)=>`<button data-act="cov:${i}" class="pointer-events-auto mono text-xs px-4 py-2.5 rounded border text-stone-200 hover:bg-stone-800" style="border-color:${GODC[d]}88"><b class="text-amber-300">${i+1}</b> ${GNAME(d)} <span class="text-stone-500">· ${t(POWERS[COV_POWER[d]].name)} · ${t('devotion')} ${piety[d].toFixed(1)}</span></button>`).join('')}</div></div></div>`:''}
   ${showChron&&started?`<div class="absolute inset-0 bg-black/85 grid place-items-center pointer-events-auto p-6" data-act="chron"><div class="max-w-lg w-full border border-stone-800 rounded-lg bg-stone-950 p-5 max-h-[80vh] overflow-auto" data-act="stop"><div class="flex justify-between items-baseline mb-3"><h2 class="serif text-2xl text-stone-100">${t('Chronicle of the Vale')}</h2><span class="mono text-[10px] text-stone-500">${t('day')} ${day}</span></div>${chronicle.length?chronicle.map(r=>`<div class="border-b border-stone-900 py-1.5"><span class="mono text-[9px] uppercase" style="color:${GODC[r.god]}">${GNAME(r.god)} · ${r.verb}</span>${r.crisis?`<span class="mono text-[8px] ml-2 ${r.done?'text-emerald-400':'text-rose-400'}">${t(r.done?'answered':'unanswered')}</span>`:''}<div class="serif italic text-[12px] text-stone-300">“${t(r.omen)||'—'}”</div></div>`).join(''):`<p class="serif italic text-stone-500">${t('The gods have not yet moved.')}</p>`}<button data-act="chron" class="mt-3 mono text-xs px-4 py-2 rounded border border-stone-600 text-stone-200 hover:bg-stone-800">${t('close')} ▸ (K)</button></div></div>`:''}
   ${omen?`<div class="absolute bottom-0 inset-x-0 px-6 pb-5 pt-10 bg-gradient-to-t from-black/95 to-transparent"><div class="max-w-2xl mx-auto text-center"><p class="serif italic text-stone-100 text-xl leading-snug">“${t(omen.text)}”</p>${pending&&!pending.result?`<div class="mt-2 pointer-events-auto flex gap-2 justify-center items-center"><span class="mono text-[10px] uppercase tracking-widest text-amber-300/80">${t('whose hand? 1–4')}</span>${DEITY_IDS.map((d,i)=>`<button data-act="acc:${i}" class="mono text-[11px] px-2 py-1 rounded border border-stone-700 text-stone-200 hover:bg-stone-800"><b class="text-amber-300">${i+1}</b> ${GNAME(d)}</button>`).join('')}</div>`:pending&&pending.result?`<p class="mono text-[11px] mt-1 ${pending.result.correct?'text-emerald-400':'text-rose-400'}">${pending.result.correct?t('✓ you knew the hand'):t('✗ it was ')+GNAME(pending.actual)}</p>`:''}</div></div>`:''}
   ${w.over?`<div class="absolute inset-0 grid place-items-center bg-black/85 pointer-events-auto"><div class="text-center max-w-xl px-6">
     <p class="mono text-[10px] uppercase tracking-[0.35em] ${w.won?'text-amber-400':'text-rose-400'}">${t(w.won?'The Tale Is Told':'The Vale Falls')}</p>
     <p class="serif text-4xl mt-3 ${w.won?'text-emerald-300':'text-rose-300'}">${w.won&&endKind&&PANTHEON[endKind]?GNAME(endKind)+t("'s Vale"):t('The vale is empty.')}</p>
     <p class="serif italic text-stone-300 mt-3 leading-snug">${w.won?t(END_TEXT[endKind]||'The vale endures under your watch.'):t('Aldermere starved before you could name a god to save it.')}</p>
     ${rival.stage>=3?`<p class="serif italic ${peaceEnd?'text-amber-200/90':'text-rose-200/90'} text-[13px] mt-2 leading-snug">${t(peaceEnd?'You spoke the deserter\'s count, and the Wolf lowered his blade. He walked back into the ash — to keep the graves, with Harl.':rivalMet>=2?'You had crossed blades with Kaine twice before he stopped running. The third time, he did not.':rivalMet===1?'You had met the Ashen Wolf once, and let him go. He did not return the courtesy — but this time, neither did you.':'A stranger called himself Kaine, and made his last stand where the ridge meets the vale.')}</p>`:''}
     <p class="serif italic text-[13px] mt-3 leading-snug">${NPCS.filter(x=>x.alive).length?`<span class="text-stone-400">${t('Still drawing breath:')}</span> <span class="text-emerald-300">${NPCS.filter(x=>x.alive).map(x=>x.name).join(', ')}</span>`:`<span class="text-rose-300">${t('None of the named folk survived.')}</span>`}${lostFolk.length?` <span class="text-stone-500">·</span> <span class="text-rose-400">${t('lost:')} ${lostFolk.join(', ')}</span>`:''}</p>
     <p class="mono text-[11px] text-stone-500 mt-3">Lv ${level} · ${t('fell')} ${deaths}× · ${day} ${t('days')} · ${t('read')} ${correct}/${reads.length} · ${NPCS.filter(x=>x.state==='done').length}/${NPCS.length} ${t('charges kept')}</p>
     <button data-act="restart" class="mt-5 mono text-sm px-4 py-2 rounded border border-stone-600 text-stone-200 hover:bg-stone-800">${t('begin anew')} ▸ (X)</button></div></div>`:''}`;
}
animate();   // renders behind the calling screen; the world wakes when you choose a god
</script>
</body>
</html>
