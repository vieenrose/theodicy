<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THEODICY · 3D — the vale</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=JetBrains+Mono&display=swap');
  html,body{margin:0;height:100%;background:#0c0a09;overflow:hidden}
  .serif{font-family:'EB Garamond',Georgia,serif}.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  canvas{display:block}
</style>
</head>
<body class="text-stone-300">
<!--
  world3d.html — the vale in 3D (three.js, CDN ES-modules, no build → CSP-safe).
  Walk in three dimensions (WASD / arrows), approach a god-site, press E to act.
  The four painted gods hover over their domains as billboards, glowing by wrath.
  Same engine.js truth; the god still just generates a lawful action.
-->
<div id="ui" class="fixed inset-0 pointer-events-none select-none"></div>
<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { newWorld, applyPlayerAction, upkeepTick, divineStrike, PANTHEON, DEITY_IDS, ranking } from './engine.js';
import { HeuristicGod } from './gods.js';

// ---- engine state (REAL-TIME: no turns; time flows, gods act on their own cadence) ----
let w = newWorld(), god = new HeuristicGod((Date.now() & 0xffff) || 1);
let dayT = 0, day = 1, divPool = 0, divBusy = false;   // day timer + divine cadence
const DAY_SECS = 13;                                    // real seconds per day of attrition
let omen = null, pending = null, reads = [], busy = false, shrineMenu = false;

// ---- three.js scene ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0a09);
scene.fog = new THREE.Fog(0x0c0a09, 60, 240);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(2, devicePixelRatio));
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

scene.add(new THREE.HemisphereLight(0x8899bb, 0x1a1410, 0.55));
const key = new THREE.DirectionalLight(0xffd9a8, 1.0); key.position.set(-40, 60, 20); scene.add(key);
const ember = new THREE.PointLight(0xff5533, 0.0, 220); ember.position.set(30, 30, -60); scene.add(ember); // grows with tension

// ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400),
  new THREE.MeshStandardMaterial({ color: 0x1a2418, roughness: 1 }));
ground.rotation.x = -Math.PI/2; scene.add(ground);
// river (a flat ribbon)
const river = new THREE.Mesh(new THREE.PlaneGeometry(220, 8),
  new THREE.MeshStandardMaterial({ color: 0x24557d, roughness: 0.4, metalness: 0.2 }));
river.rotation.x = -Math.PI/2; river.rotation.z = 0.5; river.position.set(-10, 0.1, 10); scene.add(river);
// northern ridge (cones)
for (let i=0;i<9;i++){ const h=14+Math.random()*16; const c=new THREE.Mesh(new THREE.ConeGeometry(10+Math.random()*8, h, 5),
  new THREE.MeshStandardMaterial({ color: 0x16100b, roughness:1 })); c.position.set(-90+i*22, h/2-1, -95+Math.random()*10); scene.add(c); }

// ---- god-sites ----
const SITES = {
  well:    { pos:[-55, 0, 12],  deity:'vurm',  name:'The Thirsting Well', act:{action:'tend_well'}, label:'draw & tend the water' },
  fields:  { pos:[-8, 0, 45],   deity:null,    name:'The Fields',         act:{action:'harvest'},   label:'harvest' },
  village: { pos:[8, 0, 8],     deity:null,    name:'Aldermere',          act:{action:'rest'},      label:'rest the village' },
  wall:    { pos:[42, 0, -6],   deity:null,    name:'The Palisade',       act:{action:'fortify'},   label:'fortify' },
  ridge:   { pos:[36, 0, -70],  deity:'kel',   name:'The Grudge Ridge',   act:{action:'harvest'},   label:'watch the treeline' },
  shrine:  { pos:[70, 0, 40],   deity:'ithra', name:'The Ledger Shrine',  shrine:true,              label:'offer, settle, desecrate' },
};
const tex = new THREE.TextureLoader();
const billboards = {};
for (const [id, s] of Object.entries(SITES)) {
  const grp = new THREE.Group(); grp.position.set(s.pos[0], 0, s.pos[2]); scene.add(grp); s.grp = grp;
  // landmark base
  if (id==='well'){ const ring=new THREE.Mesh(new THREE.CylinderGeometry(3,3,2,16), new THREE.MeshStandardMaterial({color:0x3f3f46})); ring.position.y=1; grp.add(ring); const water=new THREE.Mesh(new THREE.CylinderGeometry(2.2,2.2,0.3,16), new THREE.MeshStandardMaterial({color:0x3b82c4,emissive:0x0a2a44})); water.position.y=2; grp.add(water); s.water=water; }
  else if (id==='village'){ for(let i=0;i<5;i++){const a=i/5*6.28; const hut=new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshStandardMaterial({color:0x2a2320})); hut.position.set(Math.cos(a)*5,1.5,Math.sin(a)*5); grp.add(hut); const roof=new THREE.Mesh(new THREE.ConeGeometry(2.6,2,4), new THREE.MeshStandardMaterial({color:0x3a2c22})); roof.position.set(Math.cos(a)*5,4,Math.sin(a)*5); roof.rotation.y=0.78; grp.add(roof);} }
  else if (id==='fields'){ for(let i=0;i<4;i++){const f=new THREE.Mesh(new THREE.BoxGeometry(3,0.4,7), new THREE.MeshStandardMaterial({color:0x3f6b2a})); f.position.set(-6+i*4,0.2,0); grp.add(f);} s.fieldGrp=grp; }
  else if (id==='wall'){ for(let i=0;i<8;i++){const p=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,4), new THREE.MeshStandardMaterial({color:0x5b4636})); p.position.set(-7+i*2,2,0); grp.add(p);} }
  else if (id==='ridge'){ s.fireGrp=new THREE.Group(); grp.add(s.fireGrp); }
  else if (id==='shrine'){ const m=new THREE.Mesh(new THREE.BoxGeometry(3,7,3), new THREE.MeshStandardMaterial({color:0x2a2536,emissive:0x1a0a2a})); m.position.y=3.5; grp.add(m); s.monolith=m; }
  // god-portrait billboard (sprite) hovering above the site
  if (s.deity){
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex.load('./avatars/'+s.deity+'.png'), transparent:true }));
    spr.scale.set(10,10,1); spr.position.y = 16; grp.add(spr); billboards[id]=spr;
    const glow = new THREE.PointLight(new THREE.Color(PANTHEON[s.deity].color==='amber'?0xf59e0b:PANTHEON[s.deity].color==='rose'?0xfb7185:PANTHEON[s.deity].color==='emerald'?0x34d399:0xa78bfa), 0.6, 40); glow.position.y=14; grp.add(glow); s.glow=glow;
  }
}

// ---- avatar ----
const hero = new THREE.Group();
const body = new THREE.Mesh(new THREE.CapsuleGeometry(1.3,2.4,4,8), new THREE.MeshStandardMaterial({color:0xc9b892})); body.position.y=2.4; hero.add(body);
const head = new THREE.Mesh(new THREE.SphereGeometry(1.1,12,12), new THREE.MeshStandardMaterial({color:0xe7dcc4})); head.position.y=4.6; hero.add(head);
hero.position.set(8,0,8); scene.add(hero);

// ---- villagers: small autonomous agents wandering Aldermere ----
const villagers = [];
for (let i=0;i<5;i++){
  const m = new THREE.Group();
  const b = new THREE.Mesh(new THREE.CapsuleGeometry(0.7,1.4,3,6), new THREE.MeshStandardMaterial({color:0x6b5a45})); b.position.y=1.4; m.add(b);
  const h = new THREE.Mesh(new THREE.SphereGeometry(0.6,8,8), new THREE.MeshStandardMaterial({color:0xc9b28f})); h.position.y=2.6; m.add(h);
  m.position.set(8 + (Math.random()*12-6), 0, 8 + (Math.random()*12-6)); scene.add(m);
  villagers.push({ mesh:m, tgt:null, seed:Math.random()*6.28 });
}

// ---- western forest (instanced-ish cones) ----
for (let i=0;i<40;i++){
  const t = new THREE.Mesh(new THREE.ConeGeometry(1.6+Math.random(), 5+Math.random()*3, 6), new THREE.MeshStandardMaterial({color:0x16281a, roughness:1}));
  t.position.set(-95+Math.random()*30, 3, 20+Math.random()*70); scene.add(t);
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,2), new THREE.MeshStandardMaterial({color:0x2a1c12})); trunk.position.set(t.position.x,1,t.position.z); scene.add(trunk);
}

// ---- dusk sky dome ----
const sky = new THREE.Mesh(new THREE.SphereGeometry(400, 24, 16), new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: { top:{value:new THREE.Color(0x1a1533)}, bot:{value:new THREE.Color(0x3a1a18)} },
  vertexShader: 'varying vec3 vp; void main(){ vp=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
  fragmentShader: 'varying vec3 vp; uniform vec3 top; uniform vec3 bot; void main(){ float h=clamp(normalize(vp).y*0.7+0.3,0.0,1.0); gl_FragColor=vec4(mix(bot,top,h),1.0); }',
})); scene.add(sky);

// ---- ARPG combat: roaming enemies, attacks, god-power skillbar, XP, loot ----
let heroHp = 100, heroMax = 100, heroDmg = 16, heroFlash = 0, invuln = 0;
let level = 1, xp = 0, points = 1, deaths = 0, fury = 0;
let mana = 60, manaMax = 60, showTree = false, castCd = {};
let enemies = [], loot = [], spawnT = 4;
let fxT = 0, fxC = '#fff'; function fx3(c){ fxT = 0.3; fxC = c; }
const xpNext = () => 20 + (level - 1) * 18;
const GODC = { vurm:'#f59e0b', kel:'#fb7185', oss:'#34d399', ithra:'#a78bfa' };
const POWERS = {
  mend:  { god:'oss',   name:'Mend',  key:'Q', cost:20, cd:8,  pts:1, desc:'heal 45',           cast:()=>{ heroHp=Math.min(heroMax,heroHp+45); fx3('#34d399'); } },
  flood: { god:'vurm',  name:'Flood', key:'R', cost:24, cd:11, pts:1, desc:'slow all foes 4s',  cast:()=>{ enemies.forEach(e=>e.slow=4); fx3('#f59e0b'); } },
  smite: { god:'ithra', name:'Smite', key:'F', cost:26, cd:9,  pts:2, desc:'blast nearby foes', cast:()=>{ enemies.forEach(e=>{ if(!e.dying&&hero.position.distanceTo(e.mesh.position)<18){ e.hp-=48; e.hit=0.15; } }); fx3('#a78bfa'); } },
  fury:  { god:'kel',   name:'Fury',  key:'V', cost:22, cd:14, pts:2, desc:'+60% damage 8s',    cast:()=>{ fury=8; fx3('#fb7185'); } },
};
const POWER_KEYS = Object.keys(POWERS);
let unlocked = new Set(['mend']);
const KEYMAP = { q:'mend', r:'flood', f:'smite', v:'fury' };
function unlock(key){ const pw=POWERS[key]; if(pw && points>=pw.pts && !unlocked.has(key)){ points-=pw.pts; unlocked.add(key); } }
function cast(key){ const pw=POWERS[key]; if(!pw||!unlocked.has(key)||(castCd[key]||0)>0||mana<pw.cost||w.over) return; mana-=pw.cost; castCd[key]=pw.cd; pw.cast(); }
window.unlock = unlock; window.cast = cast;

function enemyMesh(x,z){ const m=new THREE.Group();
  const mat=()=>new THREE.MeshStandardMaterial({ color:0xfb7185, emissive:0x3a0d0d });
  const b=new THREE.Mesh(new THREE.CapsuleGeometry(0.9,1.8,3,6), mat()); b.position.y=1.7; m.add(b);
  const h=new THREE.Mesh(new THREE.SphereGeometry(0.7,8,8), mat()); h.position.y=3.4; m.add(h);
  m.position.set(x,0,z); scene.add(m); return m; }
function spawnEnemy(){ const rp=SITES.ridge.pos, a=Math.random()*6.28;
  enemies.push({ mesh:enemyMesh(rp[0]+Math.cos(a)*20, rp[2]+Math.abs(Math.sin(a))*14), hp:26+level*4, dmg:7, cool:0, slow:0, dying:0, hit:0, dead:false }); }
function gainXp(n){ xp+=n; while(xp>=xpNext()){ xp-=xpNext(); level++; heroMax+=18; heroHp=heroMax; heroDmg+=3; points++; fx3('#e7e5e4'); } }
function dropLoot(pos){ const kind=Math.random()<0.6?'grain':'relic';
  const mat=new THREE.MeshStandardMaterial({ color:kind==='grain'?0xf59e0b:0xa78bfa, emissive:kind==='grain'?0x3a2a0a:0x2a0a3a });
  const m=new THREE.Mesh(new THREE.OctahedronGeometry(1.1), mat); m.position.set(pos.x,1.5,pos.z); scene.add(m); loot.push({ mesh:m, kind }); }
function heroAttack(){ if(w.over) return; let best=null,bd=1e9;
  for(const e of enemies){ if(e.hp<=0||e.dying)continue; const d=hero.position.distanceTo(e.mesh.position); if(d<9&&d<bd){bd=d;best=e;} }
  if(best){ best.hp-=heroDmg*(fury>0?1.6:1); best.hit=0.15; heroFlash=0.16;
    const dir=best.mesh.position.clone().sub(hero.position); dir.y=0; hero.rotation.y=Math.atan2(dir.x,dir.z); hero.position.addScaledVector(dir.normalize(),1.3); } }
function updateCombat(dt){
  // spawn pressure scales with bandit strength (and your level)
  spawnT-=dt;
  if(spawnT<=0 && enemies.filter(e=>!e.dying).length < 4+Math.floor(w.bandits.strength)){ spawnEnemy(); spawnT=Math.max(2.2, 7 - w.bandits.strength*0.4 - level*0.15); }
  mana=Math.min(manaMax,mana+dt*7); if(fury>0)fury-=dt; if(invuln>0)invuln-=dt;
  for(const k in castCd) if(castCd[k]>0) castCd[k]-=dt;
  const clear = enemies.every(e=>e.dying || hero.position.distanceTo(e.mesh.position)>16);
  if(heroHp<heroMax && clear) heroHp=Math.min(heroMax,heroHp+7*dt);
  const vc=new THREE.Vector3(SITES.village.pos[0],0,SITES.village.pos[2]);
  for(const e of enemies){
    if(!e.dying && e.hp<=0){ e.dying=0.45; gainXp(6+level*2); if(Math.random()<0.45) dropLoot(e.mesh.position); }
    if(e.dying){ e.dying-=dt; e.mesh.scale.multiplyScalar(Math.max(0.01,1-3*dt)); if(e.dying<=0&&e.mesh.parent){ scene.remove(e.mesh); e.dead=true; } continue; }
    e.mesh.children.forEach(c=>c.material.emissive.setHex(e.hit>0?0xffffff:0x3a0d0d)); if(e.hit>0)e.hit-=dt; if(e.slow>0)e.slow-=dt;
    const dh=hero.position.distanceTo(e.mesh.position), tgt = dh<26 ? hero.position : vc;
    const dir=new THREE.Vector3(tgt.x-e.mesh.position.x,0,tgt.z-e.mesh.position.z), d=dir.length();
    if(d>3.5){ dir.normalize(); e.mesh.position.addScaledVector(dir,(e.slow>0?4:10)*dt); e.mesh.rotation.y=Math.atan2(dir.x,dir.z); }
    else { e.cool-=dt; if(e.cool<=0){ e.cool=1; if(tgt===hero.position){ if(invuln<=0){ heroHp-=e.dmg; heroFlash=0.16; } } else { w.village.morale=Math.max(0,w.village.morale-1); w.tension=Math.min(100,w.tension+0.5); } } }
  }
  enemies = enemies.filter(e=>!e.dead);
  // loot: bob, spin, auto-collect on touch
  for(let i=loot.length-1;i>=0;i--){ const L=loot[i]; L.mesh.rotation.y+=dt*2.5; L.mesh.position.y=1.5+Math.sin(clock.elapsedTime*3+i)*0.3;
    if(hero.position.distanceTo(L.mesh.position)<3.2){ if(L.kind==='grain'){ w.village.food+=4; } else { heroMax+=6; heroHp+=6; } scene.remove(L.mesh); loot.splice(i,1); fx3(L.kind==='grain'?'#f59e0b':'#a78bfa'); } }
  // death → respawn at the village with brief mercy
  if(heroHp<=0){ heroHp=heroMax; invuln=2.5; deaths++; hero.position.set(SITES.village.pos[0],0,SITES.village.pos[2]); w.village.morale=Math.max(0,w.village.morale-8); fx3('#7f1d1d'); }
}

// ---- input ----
const keys = new Set();
addEventListener('keydown', e=>{ const k=e.key.toLowerCase();
  if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)){keys.add(k);e.preventDefault();}
  if(k==='e') interact();
  if(k===' '){ heroAttack(); e.preventDefault(); }
  if(KEYMAP[k]) cast(KEYMAP[k]);                 // Q/R/F/V → god-powers
  if(k==='c') showTree = !showTree;              // Covenant board
  if(['1','2','3','4'].includes(k)){ if(shrineMenu) chooseOffer(+k-1); else if(pending&&!pending.result) accuse(+k-1); }
  if(k==='x'&&w.over) restart();                 // (R is a power key now)
});
addEventListener('keyup', e=>keys.delete(e.key.toLowerCase()));

function nearest(){ let best=null,bd=1e9; for(const [id,s] of Object.entries(SITES)){ const d=Math.hypot(hero.position.x-s.pos[0], hero.position.z-s.pos[2]); if(d<14 && d<bd){bd=d;best={id,s};} } return best; }
function interact(){ if(w.over) return; const n=nearest(); if(!n) return;
  if(n.s.shrine){shrineMenu=true;return;} doAct(n.s.act); }
function chooseOffer(i){ shrineMenu=false; doAct({action:'offer', deity:DEITY_IDS[i]}); }
function doAct(a){ shrineMenu=false; applyPlayerAction(w, a.action, a.deity); }   // instant — no turn taken
function accuse(i){ if(!pending||pending.result) return; const guess=DEITY_IDS[i]; reads.push({correct:guess===pending.actual}); pending={...pending,result:{guess,correct:guess===pending.actual}}; setTimeout(()=>{if(pending&&pending.result)pending=null;},2200); }
function restart(){
  for(const e of enemies) if(e.mesh.parent) scene.remove(e.mesh);
  for(const L of loot) if(L.mesh.parent) scene.remove(L.mesh);
  w=newWorld(); reads=[]; omen=null; pending=null; day=1; dayT=0; divPool=0;
  enemies=[]; loot=[]; heroHp=100; heroMax=100; heroDmg=16; level=1; xp=0; points=1; deaths=0; fury=0;
  mana=60; manaMax=60; unlocked=new Set(['mend']); castCd={}; spawnT=4; invuln=0; showTree=false;
  hero.position.set(SITES.village.pos[0],0,SITES.village.pos[2]);
}
window.__acc=accuse; window.restart=restart;

// ---- loop ----
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());
  // real-time flow: time passes and the gods act on their own — no turns taken
  if(!w.over){
    dayT += dt;
    if(dayT >= DAY_SECS){ dayT = 0; upkeepTick(w); day++; w.turn = day; if(w.village.pop <= 0){ w.over = true; w.won = false; } }
    divPool += dt * (0.5 + w.tension * 0.02);
    if(divPool >= 10 && !divBusy){ divPool = 0; divBusy = true;
      divineStrike(w, god).then(act => { if(act){ omen = {text:act.omen, turn:act.turn}; pending = {idx:w.ledger.length-1, actual:act.deity}; } divBusy = false; }); }
  }
  // move (world-relative)
  if(!busy && !w.over){ let dx=0,dz=0;
    if(keys.has('w')||keys.has('arrowup'))dz--; if(keys.has('s')||keys.has('arrowdown'))dz++;
    if(keys.has('a')||keys.has('arrowleft'))dx--; if(keys.has('d')||keys.has('arrowright'))dx++;
    if(dx||dz){ const m=Math.hypot(dx,dz); hero.position.x+=dx/m*26*dt; hero.position.z+=dz/m*26*dt; hero.rotation.y=Math.atan2(dx,dz); } }
  hero.position.x=THREE.MathUtils.clamp(hero.position.x,-95,95); hero.position.z=THREE.MathUtils.clamp(hero.position.z,-90,90);
  if(!w.over) updateCombat(dt);
  if(fxT>0) fxT-=dt;
  if(heroFlash>0){ heroFlash-=dt; body.material.emissive.setHex(0xff5544); } else body.material.emissive.setHex(0x000000);
  // camera follows (behind + above)
  // third-person follow: trail behind the hero's facing
  const fwd = new THREE.Vector3(Math.sin(hero.rotation.y), 0, Math.cos(hero.rotation.y));
  const camPos = hero.position.clone().addScaledVector(fwd, -30).add(new THREE.Vector3(0, 22, 0));
  camera.position.lerp(camPos, 0.09);
  camera.lookAt(hero.position.x, 6, hero.position.z);
  // villagers as autonomous agents: a condition→action policy over the same world
  // the gods read — flee the ridge when war boils, seek the well when it thirsts,
  // else keep to home. Same "generate a lawful action from state" idea as the god.
  const flee = w.tension > 60, thirst = w.village.water <= 3;
  for (const vlg of villagers) {
    const mood = flee ? 'flee' : thirst ? 'thirst' : 'home';
    if (mood !== vlg.mood || !vlg.tgt || vlg.mesh.position.distanceTo(vlg.tgt) < 1.5) {
      vlg.mood = mood;
      if (flee)        vlg.tgt = new THREE.Vector3(8 + (Math.random()*24-12), 0, 42 + Math.random()*22);            // south, away from Kel's ridge
      else if (thirst) vlg.tgt = new THREE.Vector3(-55 + (Math.random()*10-5), 0, 12 + (Math.random()*10-5));       // to the well
      else             vlg.tgt = new THREE.Vector3(8 + Math.sin(clock.elapsedTime*1.3+vlg.seed)*10, 0, 8 + Math.cos(clock.elapsedTime*0.9+vlg.seed*2)*10);
    }
    const spd = flee ? 15 : thirst ? 9 : 6.5;
    const dir = vlg.tgt.clone().sub(vlg.mesh.position); dir.y = 0; const d = dir.length();
    if (d > 0.1) { dir.normalize(); vlg.mesh.position.addScaledVector(dir, spd*dt); vlg.mesh.rotation.y = Math.atan2(dir.x, dir.z); }
    vlg.mesh.children[0].material.emissive.setHex(flee ? 0x3a0d0d : 0x000000);   // fear tints them
  }
  // tension → ember light + sky tint
  const t=w.tension/100; ember.intensity=t*2.4; scene.fog.color.setRGB(0.06+t*0.22,0.04,0.04); sky.material.uniforms.bot.value.setRGB(0.22+t*0.4,0.1,0.09);
  // billboards glow by wrath; ridge fires; well colour
  const anger=Object.fromEntries(ranking(w).map(r=>[r.deity,r.anger])); const maxA=Math.max(1,...Object.values(anger).map(Math.abs));
  for(const [id,s] of Object.entries(SITES)){ if(s.glow){ s.glow.intensity=0.4+1.6*THREE.MathUtils.clamp(anger[s.deity]/maxA,0,1); } if(s.deity&&billboards[id]) billboards[id].position.y=16+Math.sin(clock.elapsedTime*1.5+id.length)*0.6; }
  if(SITES.well.water) SITES.well.water.material.color.setHex(w.sites.well.clean?0x3b82c4:0x84812f);
  // ridge fires ~ bandits
  const fg=SITES.ridge.fireGrp; while(fg.children.length<w.bandits.strength){ const f=new THREE.Mesh(new THREE.ConeGeometry(0.8,2.4,6), new THREE.MeshStandardMaterial({color:0xf97316,emissive:0xf97316})); f.position.set(-8+fg.children.length*3,1.2,0); fg.add(f);} while(fg.children.length>w.bandits.strength) fg.remove(fg.children[fg.children.length-1]);
  if(SITES.shrine.monolith) SITES.shrine.monolith.visible=!w.sites.shrine.desecrated;
  renderer.render(scene, camera);
  drawUI();
}

// ---- HUD (DOM) ----
const ui=document.getElementById('ui');
ui.addEventListener('pointerdown', (e) => {   // delegation: survives per-frame innerHTML rebuilds
  const el = e.target.closest('[data-act]'); if (!el || el.disabled) return;
  const [cmd, arg] = el.dataset.act.split(':');
  if (cmd === 'acc') accuse(+arg);
  else if (cmd === 'restart') restart();
  else if (cmd === 'cast') cast(arg);
  else if (cmd === 'unlock') unlock(arg);
  else if (cmd === 'tree' || cmd === 'closetree') showTree = (cmd === 'tree');
});
function drawUI(){ const v=w.village,n=nearest(),correct=reads.filter(r=>r.correct).length;
  const hpPct=Math.max(0,heroHp)/heroMax*100, mnPct=mana/manaMax*100, xpPct=xp/xpNext()*100, foes=enemies.filter(e=>!e.dying).length;
  const skill = POWER_KEYS.map(k=>{ const pw=POWERS[k], has=unlocked.has(k), cd=castCd[k]||0, ready=has&&cd<=0&&mana>=pw.cost;
    return `<button data-act="${has?('cast:'+k):''}" ${has&&ready?'':'disabled'} class="pointer-events-auto text-center ${has?'':'opacity-30'}" title="${pw.name}: ${pw.desc}">
      <div class="w-11 h-11 rounded border grid place-items-center relative ${ready?'':'opacity-50'}" style="border-color:${GODC[pw.god]}66;color:${GODC[pw.god]}"><span class="mono text-[10px] font-bold">${pw.key}</span>${cd>0?`<span class="absolute inset-0 grid place-items-center bg-black/65 rounded mono text-[10px] text-stone-200">${cd.toFixed(0)}</span>`:''}</div>
      <div class="mono text-[7px] text-stone-500 mt-0.5">${has?pw.name:'locked'}</div></button>`; }).join('');
  const tree = showTree ? `<div class="absolute inset-0 bg-black/85 grid place-items-center pointer-events-auto p-6" data-act="closetree"><div class="max-w-2xl w-full border border-stone-800 rounded-lg bg-stone-950 p-6" data-act="stop"><div class="flex justify-between items-baseline mb-4"><h2 class="serif text-2xl text-stone-100">The Covenant</h2><span class="mono text-xs text-amber-300">${points} point${points!==1?'s':''}</span></div><div class="grid grid-cols-4 gap-3">${POWER_KEYS.map(k=>{const pw=POWERS[k],has=unlocked.has(k);return `<div class="border border-stone-800 rounded p-3 text-center"><div class="serif text-sm" style="color:${GODC[pw.god]}">${pw.name}${has?' ✓':''}</div><div class="mono text-[8px] text-stone-600 my-1">${pw.desc}<br/>${pw.cost} mana · [${pw.key}]</div>${has?'':`<button data-act="unlock:${k}" ${points>=pw.pts?'':'disabled'} class="mono text-[9px] px-2 py-0.5 rounded border ${points>=pw.pts?'border-stone-500 text-stone-200 hover:bg-stone-800':'border-stone-800 text-stone-600'}">unlock · ${pw.pts}pt</button>`}</div>`;}).join('')}</div><p class="serif italic text-stone-500 text-xs mt-4">Slay Kel's raiders for XP; each level grants a Covenant point. Unlock a god's power, wield it with its key.</p><button data-act="closetree" class="mt-3 mono text-xs px-4 py-2 rounded border border-stone-600 text-stone-200 hover:bg-stone-800">close ▸ (C)</button></div></div>` : '';
  ui.innerHTML=`
   <div class="absolute top-0 inset-x-0 flex items-center justify-between px-5 py-3 bg-gradient-to-b from-black/80 to-transparent">
     <div class="flex gap-3.5 items-center flex-wrap">
       <span class="serif text-xl text-stone-100 tracking-widest">THEODICY</span>
       <span class="mono text-xs text-stone-200">Lv ${level}</span>
       <span class="mono text-[10px] text-rose-300">HP</span><span class="inline-block w-24 h-2 rounded bg-stone-800 align-middle"><span class="block h-full rounded bg-rose-500" style="width:${hpPct}%"></span></span>
       <span class="mono text-[10px] text-sky-400">MP</span><span class="inline-block w-16 h-2 rounded bg-stone-800 align-middle"><span class="block h-full rounded bg-sky-500" style="width:${mnPct}%"></span></span>
       <span class="mono text-[10px] text-amber-300">XP</span><span class="inline-block w-14 h-1.5 rounded bg-stone-800 align-middle"><span class="block h-full rounded bg-amber-500" style="width:${xpPct}%"></span></span>
       <span class="mono text-xs text-stone-500">day ${day}</span>
       <span class="mono text-xs">☺ ${v.pop} · 🌾 ${v.food} · 💧 ${v.water}</span>
       <span class="mono text-xs ${w.tension>65?'text-rose-400':'text-stone-500'}">tension ${w.tension}</span>
       <span class="mono text-xs text-amber-300">read ${correct}/${reads.length}</span>
     </div>
     <a href="./explore.html" class="pointer-events-auto mono text-[10px] text-stone-500 hover:text-stone-300 border-b border-stone-800">2D ▸</a>
   </div>
   ${fxT>0?`<div class="absolute inset-0" style="background:${fxC};opacity:${(fxT*0.4).toFixed(2)}"></div>`:''}
   ${foes>0&&!w.over?`<div class="absolute top-16 left-1/2 -translate-x-1/2 mono text-xs px-3 py-1 rounded-full bg-rose-950/70 border border-rose-900 text-rose-200">⚔ ${foes} foe${foes>1?'s':''} in the vale</div>`:''}
   ${invuln>0&&!w.over?`<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 serif italic text-rose-300 text-2xl">You fell. You rise again at Aldermere.</div>`:''}
   ${!w.over?`<div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-end gap-3">
     <button data-act="tree" class="pointer-events-auto mono text-[11px] px-3 py-2 rounded border border-amber-900 text-amber-300 hover:bg-amber-950/40 self-center">✦ Covenant${points?` (${points})`:''}</button>
     <div class="flex gap-2">${skill}</div>
     <span class="mono text-[9px] text-stone-500 self-center leading-tight">SPACE attack<br/>C covenant</span>
   </div>`:''}
   ${tree}
   ${shrineMenu?`<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 border border-violet-900 bg-stone-950/95 rounded-lg p-4 text-center"><p class="serif text-lg text-violet-200 mb-2">At the shrine…</p><div class="flex gap-2">${DEITY_IDS.map((d,i)=>`<span class="mono text-[11px] px-3 py-2 rounded border border-stone-700"><b class="text-amber-300">${i+1}</b> ${PANTHEON[d].name.split(',')[0]}</span>`).join('')}</div><p class="mono text-[9px] text-stone-600 mt-2">press 1–4</p></div>`:''}
   ${!shrineMenu&&n&&!busy&&!w.over?`<div class="absolute left-1/2 bottom-24 -translate-x-1/2 text-center"><span class="mono text-xs px-3 py-1.5 rounded-full bg-black/70 border border-stone-700 text-stone-200">[E] ${n.s.label} — <span class="text-stone-500">${n.s.name}</span></span></div>`:''}
   ${!n&&!w.over?`<div class="absolute left-1/2 bottom-10 -translate-x-1/2 mono text-[10px] text-stone-600">WASD / arrows to walk · approach a place and press E</div>`:''}
   ${omen?`<div class="absolute bottom-0 inset-x-0 px-6 pb-5 pt-10 bg-gradient-to-t from-black/95 to-transparent"><div class="max-w-2xl mx-auto text-center"><p class="serif italic text-stone-100 text-xl leading-snug">“${omen.text}”</p>${pending&&!pending.result?`<div class="mt-2 pointer-events-auto flex gap-2 justify-center items-center"><span class="mono text-[10px] uppercase tracking-widest text-amber-300/80">whose hand? 1–4</span>${DEITY_IDS.map((d,i)=>`<button data-act="acc:${i}" class="mono text-[11px] px-2 py-1 rounded border border-stone-700 text-stone-200 hover:bg-stone-800"><b class="text-amber-300">${i+1}</b> ${PANTHEON[d].name.split(',')[0]}</button>`).join('')}</div>`:pending&&pending.result?`<p class="mono text-[11px] mt-1 ${pending.result.correct?'text-emerald-400':'text-rose-400'}">${pending.result.correct?'✓ you knew the hand':'✗ it was '+PANTHEON[pending.actual].name.split(',')[0]}</p>`:''}</div></div>`:''}
   ${w.over?`<div class="absolute inset-0 grid place-items-center bg-black/75 pointer-events-auto"><div class="text-center"><p class="serif text-4xl ${w.won?'text-emerald-300':'text-rose-300'}">The vale is empty.</p><p class="serif italic text-stone-400 mt-2">You reached level ${level}, fell ${deaths} times, and read ${correct}/${reads.length} of their hands over ${day} days.</p><button data-act="restart" class="mt-4 mono text-sm px-4 py-2 rounded border border-stone-600 text-stone-200 hover:bg-stone-800">rise again ▸ (X)</button></div></div>`:''}`;
}
animate();
</script>
</body>
</html>
