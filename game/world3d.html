<!--
  world3d.html — the vale in 3D (three.js, CDN ES-modules, no build → CSP-safe).
  Walk in three dimensions (WASD / arrows), approach a god-site, press E to act.
  The four painted gods hover over their domains as billboards, glowing by wrath.
  Same engine.js truth; the god still just generates a lawful action.
-->
<div id="ui" class="fixed inset-0 pointer-events-none select-none"></div>
<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { newWorld, applyPlayerAction, upkeepTick, divineStrike, PANTHEON, DEITY_IDS, ranking } from './engine.js';
import { HeuristicGod, InstructGod } from './gods.js';

// ---- engine state (REAL-TIME: no turns; time flows, gods act on their own cadence) ----
let w = newWorld(), god = new HeuristicGod((Date.now() & 0xffff) || 1);
let godBackend = 'heuristic', godLoading = false, godPct = 0, godName = '';   // the divine mind: heuristic ↔ in-browser LLM
let dayT = 0, day = 1, divPool = 0, divBusy = false;   // day timer + divine cadence
const DAY_SECS = 13;                                    // real seconds per day of attrition

// ---- procedural audio: synthesized score + SFX (Web Audio, no files, CSP-safe) ----
const AUDIO = (() => {
  let ctx, master, muted = false, drone = [], mmode = 'explore';
  let tracks = {}, played = 0, failed = 0, droneOn = false;   // track els + load state
  // NOTE: music plays via PLAIN <audio> volume (not a MediaElementSource) — on the HF Space the
  // mp3s redirect to a cross-origin CDN, which taints Web-Audio-routed media to SILENCE. Direct
  // playback is CORS-immune. Only the synthesized SFX/bells/drone go through the Web Audio graph.
  const MVOL = 0.85;
  let mvol = {explore:0, combat:0}, mtarget = {explore:MVOL, combat:0}, musicTimer = 0;
  const now = () => ctx.currentTime;
  function ensure(){                                   // must be called from a user gesture
    if(!ctx){ try { ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ return; }
      master = ctx.createGain(); master.gain.value = 0; master.connect(ctx.destination);
      master.gain.linearRampToValueAtTime(muted?0:0.9, ctx.currentTime + 2.5);
      startMusic(); }
    if(ctx.state === 'suspended') ctx.resume();
    if(!muted) for(const k in tracks){ if(tracks[k].paused) tracks[k].play().catch(()=>{}); }  // retry autoplay-blocked stems on later gestures
  }
  function startMusic(){                               // two pre-generated tracks (Stable Audio), crossfaded by tension
    let built = 0;
    try {
      for(const name of ['explore','combat']){
        const el = new Audio('./music/'+name+'.mp3'); el.loop = true; el.preload = 'auto';
        el.volume = muted ? 0 : mvol[name];            // direct volume — NOT routed through Web Audio
        el.addEventListener('error', onTrackFail);     // 404 / decode / CSP fails ASYNC — caught here
        tracks[name] = el;
        el.play().then(()=>{ played++; }).catch(onTrackFail);
        built++;
      }
    } catch(e){ /* Audio unsupported — fall through to drone */ }
    if(built < 2) droneFallback();
    else { musicTimer = setInterval(fadeTick, 50); setTimeout(()=>{ if(played === 0) droneFallback(); }, 4000); }
    bells();                                            // sparse tolling either way
  }
  function fadeTick(){                                  // manual volume crossfade (Web-Audio ramps can't touch a plain <audio>)
    for(const k in tracks){ mvol[k] += (mtarget[k]-mvol[k])*0.09; try { tracks[k].volume = muted?0:Math.max(0,Math.min(1,mvol[k])); } catch(e){} } }
  function onTrackFail(){ if(++failed >= 2) droneFallback(); }   // both stems dead → keep the air alive
  function setMode(m){                                  // 'explore' | 'combat' — retarget the crossfade
    if(m===mmode) return; mmode = m;
    mtarget.explore = (m==='explore') ? MVOL : 0.0; mtarget.combat = (m==='combat') ? MVOL : 0.0;
  }
  function droneFallback(){                             // a slow dark drone: root+fifth+octave through a moving lowpass
    if(droneOn || !ctx) return; droneOn = true;         // idempotent: only ever one drone, even if both callers fire
    const filt = ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=360; filt.Q.value=5; filt.connect(master);
    const lfo = ctx.createOscillator(), lg = ctx.createGain(); lfo.frequency.value=0.05; lg.gain.value=180; lfo.connect(lg); lg.connect(filt.frequency); lfo.start();
    for(const f of [55, 82.4, 110]){ const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=f; o.detune.value=Math.random()*8-4;
      const g=ctx.createGain(); g.gain.value=0.08; o.connect(g); g.connect(filt); o.start(); drone.push({o,g}); }
  }
  const SCALE=[0,3,5,7,10];
  function bells(){ if(ctx){ const s=SCALE[(Math.random()*SCALE.length)|0]+((Math.random()<0.4)?12:0); bell(220*Math.pow(2,s/12), now()+0.1, 0.05); }
    setTimeout(bells, 3200 + Math.random()*4500); }
  function bell(freq,t,gain){ if(!ctx) return; const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=freq;
    const g=ctx.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(gain,t+0.02); g.gain.exponentialRampToValueAtTime(0.0008,t+3);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+3.2); }
  function tone(freq,dur,type,gain,slide){ if(!ctx||muted) return; const t=now(); const o=ctx.createOscillator(); o.type=type; o.frequency.setValueAtTime(freq,t); if(slide)o.frequency.exponentialRampToValueAtTime(slide,t+dur);
    const g=ctx.createGain(); g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur); o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02); }
  function noise(dur,gain,hp){ if(!ctx||muted) return; const t=now(); const n=ctx.createBufferSource(); const buf=ctx.createBuffer(1,(ctx.sampleRate*dur)|0,ctx.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; n.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; const g=ctx.createGain(); g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur); n.connect(f); f.connect(g); g.connect(master); n.start(t); n.stop(t+dur); }
  const sfx = {
    attack: ()=>{ noise(0.1,0.16,1200); tone(200,0.09,'square',0.1,90); },
    hit:    ()=>{ tone(150,0.12,'triangle',0.2,60); noise(0.05,0.1,500); },
    cast:   (f=520)=>{ tone(f,0.5,'sine',0.16,f*2); tone(f*1.5,0.4,'sine',0.08); },
    level:  ()=>{ [0,4,7,12].forEach((s,i)=>setTimeout(()=>tone(440*Math.pow(2,s/12),0.4,'triangle',0.18),i*95)); },
    pickup: ()=>{ tone(880,0.14,'sine',0.13,1320); },
    omen:   ()=>{ tone(69,1.3,'sine',0.2); bell(207,now(),0.05); },
    death:  ()=>{ tone(220,1.1,'sawtooth',0.22,55); },
    boss:   ()=>{ tone(48,1.8,'sawtooth',0.28); [0,3,7].forEach((s,i)=>setTimeout(()=>tone(110*Math.pow(2,s/12),0.6,'square',0.13),i*150)); },
  };
  function toggleMute(){ muted=!muted; if(master) master.gain.linearRampToValueAtTime(muted?0:0.9, now()+0.3);
    for(const k in tracks){ if(muted) tracks[k].pause(); else tracks[k].play().catch(()=>{}); } }  // stop decoding, not just silence
  return { ensure, sfx, setMode, toggleMute, muted:()=>muted, live:()=>!!ctx };
})();
const GODF = { vurm:392, kel:311, oss:523, ithra:466 };   // a cast pitch per god
let omen = null, pending = null, reads = [], busy = false, shrineMenu = false;

// ---- three.js scene ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0a09);
scene.fog = new THREE.Fog(0x0c0a09, 60, 240);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(2, devicePixelRatio));
document.body.appendChild(renderer.domElement);
renderer.domElement.tabIndex = 0;                        // focusable, so keys reach us even when embedded
addEventListener('resize', () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

// ---- RTS click-to-move: left-click the ground to walk there; click a foe to attack-move ----
const _ray = new THREE.Raycaster(), _ndc = new THREE.Vector2(), _plane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
let moveTarget = null, attackTarget = null, atkTimer = 0, marker = null;
let dodgeCd = 0, dodgeT = 0; const dodgeDir = new THREE.Vector3(0,0,1);   // roll with i-frames
renderer.domElement.addEventListener('pointerdown', (e) => {
  if(e.button !== 0) return;                              // left button only
  AUDIO.ensure(); window.focus();                         // also grabs keyboard focus (fixes embedded "can't move")
  if(busy || w.over || !started) return;
  _ndc.x = (e.clientX/innerWidth)*2 - 1; _ndc.y = -(e.clientY/innerHeight)*2 + 1;
  _ray.setFromCamera(_ndc, camera);
  const p = new THREE.Vector3();
  if(!_ray.ray.intersectPlane(_plane, p)) return;
  p.x = THREE.MathUtils.clamp(p.x,-95,95); p.z = THREE.MathUtils.clamp(p.z,-90,90);
  const foe = enemies.find(f => !f.dying && Math.hypot(f.mesh.position.x-p.x, f.mesh.position.z-p.z) < 3.6);
  if(foe){ attackTarget = foe; moveTarget = null; } else { moveTarget = {x:p.x, z:p.z}; attackTarget = null; }
  if(!marker){ marker = new THREE.Mesh(new THREE.RingGeometry(1.0,1.5,22), new THREE.MeshBasicMaterial({transparent:true, side:THREE.DoubleSide})); marker.rotation.x=-Math.PI/2; scene.add(marker); }
  marker.material.color.setHex(foe?0xfb7185:0xa78bfa); marker.position.set(p.x,0.25,p.z); marker.visible=true; marker.userData.t=1;
});

scene.add(new THREE.HemisphereLight(0x8899bb, 0x1a1410, 0.55));
const key = new THREE.DirectionalLight(0xffd9a8, 1.0); key.position.set(-40, 60, 20); scene.add(key);
const ember = new THREE.PointLight(0xff5533, 0.0, 220); ember.position.set(30, 30, -60); scene.add(ember); // grows with tension

// ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400),
  new THREE.MeshStandardMaterial({ color: 0x1a2418, roughness: 1 }));
ground.rotation.x = -Math.PI/2; scene.add(ground);
// river (a flat ribbon)
const river = new THREE.Mesh(new THREE.PlaneGeometry(220, 8),
  new THREE.MeshStandardMaterial({ color: 0x24557d, roughness: 0.4, metalness: 0.2 }));
river.rotation.x = -Math.PI/2; river.rotation.z = 0.5; river.position.set(-10, 0.1, 10); scene.add(river);
// northern ridge (cones)
for (let i=0;i<9;i++){ const h=14+Math.random()*16; const c=new THREE.Mesh(new THREE.ConeGeometry(10+Math.random()*8, h, 5),
  new THREE.MeshStandardMaterial({ color: 0x16100b, roughness:1 })); c.position.set(-90+i*22, h/2-1, -95+Math.random()*10); scene.add(c); }

// ---- god-sites ----
const SITES = {
  well:    { pos:[-55, 0, 12],  deity:'vurm',  name:'The Thirsting Well', act:{action:'tend_well'}, label:'draw & tend the water' },
  fields:  { pos:[-8, 0, 45],   deity:null,    name:'The Fields',         act:{action:'harvest'},   label:'harvest' },
  village: { pos:[8, 0, 8],     deity:null,    name:'Aldermere',          act:{action:'rest'},      label:'rest the village' },
  wall:    { pos:[42, 0, -6],   deity:null,    name:'The Palisade',       act:{action:'fortify'},   label:'fortify' },
  ridge:   { pos:[36, 0, -70],  deity:'kel',   name:'The Grudge Ridge',   act:{action:'harvest'},   label:'watch the treeline' },
  shrine:  { pos:[70, 0, 40],   deity:'ithra', name:'The Ledger Shrine',  shrine:true,              label:'offer, settle, desecrate' },
};
const tex = new THREE.TextureLoader();
const billboards = {};
for (const [id, s] of Object.entries(SITES)) {
  const grp = new THREE.Group(); grp.position.set(s.pos[0], 0, s.pos[2]); scene.add(grp); s.grp = grp;
  // landmark base
  if (id==='well'){ const ring=new THREE.Mesh(new THREE.CylinderGeometry(3,3,2,16), new THREE.MeshStandardMaterial({color:0x3f3f46})); ring.position.y=1; grp.add(ring); const water=new THREE.Mesh(new THREE.CylinderGeometry(2.2,2.2,0.3,16), new THREE.MeshStandardMaterial({color:0x3b82c4,emissive:0x0a2a44})); water.position.y=2; grp.add(water); s.water=water; }
  else if (id==='village'){ for(let i=0;i<5;i++){const a=i/5*6.28; const hut=new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshStandardMaterial({color:0x2a2320})); hut.position.set(Math.cos(a)*5,1.5,Math.sin(a)*5); grp.add(hut); const roof=new THREE.Mesh(new THREE.ConeGeometry(2.6,2,4), new THREE.MeshStandardMaterial({color:0x3a2c22})); roof.position.set(Math.cos(a)*5,4,Math.sin(a)*5); roof.rotation.y=0.78; grp.add(roof);} }
  else if (id==='fields'){ for(let i=0;i<4;i++){const f=new THREE.Mesh(new THREE.BoxGeometry(3,0.4,7), new THREE.MeshStandardMaterial({color:0x3f6b2a})); f.position.set(-6+i*4,0.2,0); grp.add(f);} s.fieldGrp=grp; }
  else if (id==='wall'){ for(let i=0;i<8;i++){const p=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,4), new THREE.MeshStandardMaterial({color:0x5b4636})); p.position.set(-7+i*2,2,0); grp.add(p);} }
  else if (id==='ridge'){ s.fireGrp=new THREE.Group(); grp.add(s.fireGrp); }
  else if (id==='shrine'){ const m=new THREE.Mesh(new THREE.BoxGeometry(3,7,3), new THREE.MeshStandardMaterial({color:0x2a2536,emissive:0x1a0a2a})); m.position.y=3.5; grp.add(m); s.monolith=m; }
  // god-portrait billboard (sprite) hovering above the site
  if (s.deity){
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex.load('./avatars/'+s.deity+'.png'), transparent:true }));
    spr.scale.set(10,10,1); spr.position.y = 16; grp.add(spr); billboards[id]=spr;
    const glow = new THREE.PointLight(new THREE.Color(PANTHEON[s.deity].color==='amber'?0xf59e0b:PANTHEON[s.deity].color==='rose'?0xfb7185:PANTHEON[s.deity].color==='emerald'?0x34d399:0xa78bfa), 0.6, 40); glow.position.y=14; grp.add(glow); s.glow=glow;
  }
}

// ---- avatar ----
// a cloaked wayfarer, layered primitives that read as a person — not a capsule
const hero = new THREE.Group();
const _hm = (c,rg,mt)=>new THREE.MeshStandardMaterial({color:c,roughness:rg??0.8,metalness:mt||0});
const legL = new THREE.Mesh(new THREE.BoxGeometry(0.7,2.3,0.7), _hm(0x3b2a1c)); legL.position.set(-0.5,1.15,0); hero.add(legL);
const legR = new THREE.Mesh(new THREE.BoxGeometry(0.7,2.3,0.7), _hm(0x3b2a1c)); legR.position.set(0.5,1.15,0); hero.add(legR);
const body = new THREE.Mesh(new THREE.CylinderGeometry(1.0,1.25,2.3,12), _hm(0x5b6472,0.7,0.15)); body.position.y=3.35; hero.add(body); // torso — flashes on hurt
const chest = new THREE.Mesh(new THREE.CapsuleGeometry(1.02,0.9,4,10), _hm(0x9aa3ad,0.4,0.75)); chest.scale.set(1,0.85,0.62); chest.position.y=3.7; hero.add(chest);
const armL = new THREE.Mesh(new THREE.BoxGeometry(0.5,2.0,0.5), _hm(0x4a5360,0.7)); armL.position.set(-1.35,3.35,0); hero.add(armL);
const armR = new THREE.Mesh(new THREE.BoxGeometry(0.5,2.0,0.5), _hm(0x4a5360,0.7)); armR.position.set(1.35,3.35,0); hero.add(armR);
const head = new THREE.Mesh(new THREE.SphereGeometry(0.82,14,14), _hm(0xcaa47a,0.9)); head.position.y=5.05; hero.add(head);
const hood = new THREE.Mesh(new THREE.ConeGeometry(1.12,1.7,12), _hm(0x3b2f4a,0.95)); hood.position.y=5.35; hero.add(hood);
const cloak = new THREE.Mesh(new THREE.PlaneGeometry(2.3,3.6), new THREE.MeshStandardMaterial({color:0x3b2f4a,roughness:1,side:THREE.DoubleSide})); cloak.position.set(0,3.3,-0.82); hero.add(cloak);
const blade = new THREE.Mesh(new THREE.BoxGeometry(0.16,2.8,0.5), _hm(0xd7dde3,0.3,0.9)); blade.position.set(1.9,3.8,0.35); hero.add(blade);
const hilt = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.22,0.24), _hm(0x2a1c10)); hilt.position.set(1.9,2.4,0.35); hero.add(hilt);
hero.position.set(8,0,8); scene.add(hero);

// ---- villagers: small autonomous agents wandering Aldermere ----
const villagers = [];
for (let i=0;i<5;i++){
  const m = new THREE.Group();
  const b = new THREE.Mesh(new THREE.CapsuleGeometry(0.7,1.4,3,6), new THREE.MeshStandardMaterial({color:0x6b5a45})); b.position.y=1.4; m.add(b);
  const h = new THREE.Mesh(new THREE.SphereGeometry(0.6,8,8), new THREE.MeshStandardMaterial({color:0xc9b28f})); h.position.y=2.6; m.add(h);
  m.position.set(8 + (Math.random()*12-6), 0, 8 + (Math.random()*12-6)); scene.add(m);
  villagers.push({ mesh:m, tgt:null, seed:Math.random()*6.28 });
}

// ---- NAMED FOLK OF ALDERMERE: the social pillar — talk (E), take their charge, be remembered ----
const NPCS = [
  { id:'maren', name:'Maren', role:'the well-keeper', god:'vurm', color:0x60a5fa, pos:[-40,0,15],
    quest:{ desc:'Cleanse the Thirsting Well  [tend it]', kind:'well' },
    say:{ idle:'The well tastes of copper and old grudge. Vurm counts every cup we drew untended. Cleanse it, and I will rest easier.',
          active:'Still it runs foul. Please — draw the cover, clear the silt.',
          done:'The water runs clear again. Bless your hands. Vurm is quiet… for now.',
          crisis:'The well sours as we speak — go, before the children drink!' } },
  { id:'oda', name:'Oda', role:'a young mother', god:'oss', color:0x34d399, pos:[13,0,15],
    quest:{ desc:'Bring the village respite  [rest Aldermere, or Mend]', kind:'mercy' },
    say:{ idle:"My boy hasn't woken clear-eyed in days. If Oss still leans kind, let the village rest a while.",
          active:'He is weaker today. We need respite — rest us, or a mending hand.',
          done:'He smiled this morning. Oss’s mercy moves through you. Thank you.',
          crisis:'Everyone is afraid. Steady us — we cannot hold if hope goes.' } },
  { id:'bran', name:'Bran', role:'the watchman', god:'kel', color:0xfb7185, pos:[36,0,4],
    quest:{ desc:'Break the ridge-raiders  [slay 4]', kind:'slay', n:4 },
    say:{ idle:"Kel is not prayed away, only met. Cut down four of his dogs and the ridge learns fear.",
          active:'Fewer than four still breathe up there. Keep at it.',
          done:'Four cold on the slope. Kel respects a blade that answers. Well fought.',
          crisis:"They are coming NOW — meet them, quickly!" } },
  { id:'sela', name:'Sela', role:'the shrine-tender', god:'ithra', color:0xa78bfa, pos:[58,0,33],
    quest:{ desc:"Read a god's hand truly  [name one omen right]", kind:'read' },
    say:{ idle:'Ithra keeps a ledger, and so must you. When the next omen comes, name whose hand it was — truly.',
          active:'The signs still puzzle you. Watch closer; name the next one right.',
          done:'You saw the hand behind the sign. Ithra marks you as one who reckons true.',
          crisis:'A judgement comes. Read it rightly, or we answer a debt not ours.' } },
];
function makeNameplate(text, hex){
  const cv=document.createElement('canvas'); cv.width=256; cv.height=64; const x=cv.getContext('2d');
  x.fillStyle='rgba(12,10,9,0.62)'; x.fillRect(6,14,244,36);
  x.font='30px Georgia'; x.textAlign='center'; x.textBaseline='middle'; x.fillStyle=hex||'#e7e5e4'; x.fillText(text,128,34);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({ map:new THREE.CanvasTexture(cv), transparent:true, depthTest:false }));
  spr.scale.set(8.5,2.1,1); spr.position.y=6.6; return spr;
}
function npcColorHex(c){ return '#'+c.toString(16).padStart(6,'0'); }
function buildNPC(n){
  const g=new THREE.Group();
  const robe=new THREE.Mesh(new THREE.ConeGeometry(1.3,3.4,8), new THREE.MeshStandardMaterial({color:n.color, roughness:0.85})); robe.position.y=1.7; g.add(robe);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.72,12,12), new THREE.MeshStandardMaterial({color:0xcaa47a, roughness:0.9})); head.position.y=3.7; g.add(head);
  g.add(makeNameplate(n.name, npcColorHex(n.color)));
  g.position.set(n.pos[0],0,n.pos[2]); scene.add(g);
  n.mesh=g; n.body=robe; n.alive=true; n.state='idle'; n.talked=false; n.kills=0;
}
NPCS.forEach(buildNPC);
let npcMenu=null, lostFolk=[], npcPeril=[6,4,2];   // as Aldermere empties, its folk are lost
function npcLine(n){ if(n.state==='done') return n.say.done; if(crisis&&crisis.god===n.god&&!crisis.resolved) return n.say.crisis; if(n.state==='active') return n.say.active; return n.say.idle; }
function talkTo(n){ n.talked=true; if(n.state==='idle'){ n.state='active'; toast=`Charge taken — ${n.name}: ${n.quest.desc}`; toastT=3.5; } npcMenu=n; }
function completeNPC(n){ if(!n||n.state==='done') return; n.state='done'; addPiety(n.god,1); w.village.morale=Math.min(100,w.village.morale+6);
  toast=`${n.name}’s charge fulfilled — the vale takes heart.`; toastT=3.5; if(npcMenu&&npcMenu.id===n.id) npcMenu=n; }
function npcOf(kind){ return NPCS.find(n=>n.alive && n.state==='active' && n.quest.kind===kind); }
function killNPC(){ const doomed=NPCS.filter(n=>n.alive); if(!doomed.length) return;
  doomed.sort((a,b)=> (a.state==='done'?1:0)-(b.state==='done'?1:0));   // the unhelped fall first

function startGame(cid){ calling=cid; started=true; unlocked=new Set([CALLINGS[cid].power]); piety[cid]+=2;
  banner={t:'The Vale of Aldermere', brief:CALLINGS[cid].blurb}; bannerT=6; }
function addPiety(god,n){ piety[god]=Math.max(0,Math.min(10, piety[god]+n)); }
function spawnWave(n){ for(let i=0;i<n;i++) spawnEnemy(); }
function beginCrisis(verb, act){ const c=CRISES[verb]; if(!c) return;
  crisis={...c, verb, resolved:false}; banner={t:c.title, brief:act.omen||''}; bannerT=5;
  if(c.kind==='slay'){ w.tension=Math.max(w.tension,55); spawnWave(2+Math.floor(day/3)); } }
function resolveCrisis(){ if(!crisis||crisis.resolved) return; crisis.resolved=true; addPiety(crisis.god,1.5);
  toast=`${crisis.title} — answered. ${GNAME(crisis.god)} takes note.`; toastT=3;
  const rec=chronicle.find(r=>r.crisis===crisis.title&&!r.done); if(rec) rec.done=true; crisis=null; }
function onGodAct(act){                                   // THE hook: one real divine choice → story
  chronicle.unshift({turn:act.turn, god:act.deity, verb:act.verb, omen:act.omen,
                     crisis:(CRISES[act.verb]||{}).title, done:false});
  if(chronicle.length>24) chronicle.pop();
  if(['mend','shelter','respite'].includes(act.verb)){ addPiety('oss',0.5); toast='Oss stays the ruin.'; toastT=2.5; }
  else if(act.verb==='bargain'||act.verb==='reveal'){ addPiety('ithra',0.4); }
  else if(CRISES[act.verb] && (!crisis||crisis.resolved) && !trialOn){ beginCrisis(act.verb, act); }
}

  if(crisis && !crisis.resolved && crisis.kind==='slay' && enemies.every(e=>e.dying)) resolveCrisis(); }
function forceChampion(){ if(enemies.some(e=>e.boss&&!e.dying)) return; const T=ETYPES.champion, rp=SITES.ridge.pos, hp=Math.round(T.hp*(1+level*0.12));

  unlocked.add(COV_POWER[covenant]); banner={t:`Covenant with ${GNAME(covenant)}`, brief:'Their rival rises to test your oath.'}; bannerT=5;
  trialOn=true; w.tension=Math.max(w.tension,72); forceChampion(); }   // the final trial
function endGame(won,kind){ w.over=true; w.won=won; endKind=kind; }

// ---- awaken the real model: swap god.decide() to the in-browser 50M LLM (WebGPU→WASM, else keep heuristic) ----
async function awakenModel(){
  if(godLoading || godBackend==='supra') return;
  godLoading=true; godPct=0; toast='The divine mind stirs…'; toastT=3;
  // tiered: WebGPU → Qwen2.5-0.5B that actually CHOOSES (4/4 in eval); WASM → SmolLM2-360M voice-only
  const plan = navigator.gpu
    ? [{id:'onnx-community/Qwen2.5-0.5B-Instruct', name:'Qwen2.5-0.5B', mode:'choose', device:'webgpu'},
       {id:'HuggingFaceTB/SmolLM2-360M-Instruct', name:'SmolLM2-360M', mode:'voice',  device:'wasm'}]
    : [{id:'HuggingFaceTB/SmolLM2-360M-Instruct', name:'SmolLM2-360M', mode:'voice',  device:'wasm'}];
  for(const cfg of plan){
    try{
      godPct=0; godName=cfg.name;
      const s = new InstructGod(cfg.id, { name:cfg.name, mode:cfg.mode, device:cfg.device, dtype:'q4f16' });
      await s.load(p=>{ if(p && p.status==='progress') godPct=Math.round(p.progress||0); });
      god=s; godBackend='supra'; godLoading=false;
      toast = cfg.mode==='choose' ? `${cfg.name} awakes — the god now chooses and speaks for itself.`
                                  : `${cfg.name} awakes — the god speaks its own omens.`;
      toastT=4.5; return;
    }catch(e){ console.warn('awaken('+cfg.id+'/'+cfg.device+') failed:', e); }
  }
  godLoading=false; godBackend='heuristic';
  toast='The divine mind would not wake here (no WebGPU?). The vale keeps its old gods.'; toastT=5;
}
window.awakenModel = awakenModel;

function enemyMesh(x,z,T){ const m=new THREE.Group(); const S=T.scale;
  const mat=(c)=>new THREE.MeshStandardMaterial({ color:c??T.color, emissive:0x3a0d0d, roughness:0.85 });
  if(T.name==='wolf'){                                  // a low four-legged beast
    const bd=new THREE.Mesh(new THREE.CapsuleGeometry(0.62*S,1.9*S,4,8), mat()); bd.rotation.z=Math.PI/2; bd.position.y=1.05*S; m.add(bd);
    const hd=new THREE.Mesh(new THREE.ConeGeometry(0.5*S,1.1*S,7), mat()); hd.rotation.z=-Math.PI/2; hd.position.set(1.5*S,1.25*S,0); m.add(hd);
    for(const sx of [-1,1]) for(const sz of [-0.7,0.9]){ const lg=new THREE.Mesh(new THREE.CylinderGeometry(0.16*S,0.12*S,1.1*S), mat(0x2a1a12)); lg.position.set(sz*S,0.55*S,sx*0.42*S); m.add(lg); }
    const tl=new THREE.Mesh(new THREE.ConeGeometry(0.22*S,1.3*S,6), mat()); tl.rotation.z=Math.PI/2.6; tl.position.set(-1.4*S,1.35*S,0); m.add(tl);
  } else {                                              // a humanoid foe — raider / brute / champion
    for(const sx of [-1,1]){ const lg=new THREE.Mesh(new THREE.BoxGeometry(0.46*S,1.7*S,0.46*S), mat(0x2a1a12)); lg.position.set(sx*0.44*S,0.85*S,0); m.add(lg); }
    const torso=new THREE.Mesh(new THREE.CylinderGeometry(0.82*S,1.02*S,1.9*S,9), mat()); torso.position.y=2.6*S; m.add(torso);
    for(const sx of [-1,1]){ const ar=new THREE.Mesh(new THREE.BoxGeometry(0.4*S,1.7*S,0.4*S), mat()); ar.position.set(sx*1.16*S,2.65*S,0); m.add(ar); }
    const hd=new THREE.Mesh(new THREE.SphereGeometry(0.58*S,10,10), mat(0x6b4636)); hd.position.y=3.85*S; m.add(hd);
    if(T.boss){                                         // Champion of Kel: horns + greatsword
      for(const sx of [-1,1]){ const horn=new THREE.Mesh(new THREE.ConeGeometry(0.18*S,0.9*S,6), mat(0xe5e0d5)); horn.position.set(sx*0.42*S,4.45*S,0); horn.rotation.z=sx*0.5; m.add(horn); }
      const gs=new THREE.Mesh(new THREE.BoxGeometry(0.28*S,3.8*S,0.6*S), mat(0xb7bdc4)); gs.position.set(1.5*S,3.2*S,0.2*S); m.add(gs);
    } else { const wpn=new THREE.Mesh(new THREE.BoxGeometry(0.2*S,2.1*S,0.42*S), mat(0x8a8f96)); wpn.position.set(1.35*S,2.8*S,0.2*S); m.add(wpn); }
  }
  m.position.set(x,0,z); scene.add(m); return m; }
function pickType(){
  if(w.tension>70 && !enemies.some(e=>e.boss) && Math.random()<0.14) return 'champion';
  const r=Math.random();
  if(w.bandits.strength>=5 && r<0.22) return 'brute';
  if(r<0.34) return 'wolf';
  return 'raider';
}
function spawnEnemy(){ const T=ETYPES[pickType()], rp=SITES.ridge.pos, a=Math.random()*6.28;
  const hp=Math.round(T.hp*(1+level*0.1));
  enemies.push({ mesh:enemyMesh(rp[0]+Math.cos(a)*20, rp[2]+Math.abs(Math.sin(a))*14, T),
    hp, maxHp:hp, dmg:T.dmg, spd:T.spd, r:T.r, xpv:T.xp, boss:!!T.boss, tname:T.name,
    cool:0, slow:0, dying:0, hit:0, dead:false }); if(T.boss) AUDIO.sfx.boss(); }
function addHit(pos, dmg){ hits.push({ pos: pos.clone(), text:'-'+Math.round(dmg), t:0.9 }); }
function gainXp(n){ xp+=n; while(xp>=xpNext()){ xp-=xpNext(); level++; heroMax+=18; heroHp=heroMax; heroDmg+=3; points++; fx3('#e7e5e4'); AUDIO.sfx.level(); } }
function dropLoot(pos){ const kind=Math.random()<0.6?'grain':'relic';
  const mat=new THREE.MeshStandardMaterial({ color:kind==='grain'?0xf59e0b:0xa78bfa, emissive:kind==='grain'?0x3a2a0a:0x2a0a3a });
  const m=new THREE.Mesh(new THREE.OctahedronGeometry(1.1), mat); m.position.set(pos.x,1.5,pos.z); scene.add(m); loot.push({ mesh:m, kind }); }
function heroAttack(){ if(w.over) return; AUDIO.sfx.attack(); let best=null,bd=1e9;
  for(const e of enemies){ if(e.hp<=0||e.dying)continue; const d=hero.position.distanceTo(e.mesh.position); if(d<9&&d<bd){bd=d;best=e;} }
  if(best){ const dmg=heroDmg*(fury>0?1.6:1); best.hp-=dmg; best.hit=0.15; heroFlash=0.16; AUDIO.sfx.hit(); addHit(best.mesh.position, dmg);
    const dir=best.mesh.position.clone().sub(hero.position); dir.y=0; hero.rotation.y=Math.atan2(dir.x,dir.z); hero.position.addScaledVector(dir.normalize(),1.3); } }
function updateCombat(dt){
  // spawn pressure scales with bandit strength (and your level)
  spawnT-=dt;
  if(spawnT<=0 && enemies.filter(e=>!e.dying).length < 4+Math.floor(w.bandits.strength)){ spawnEnemy(); spawnT=Math.max(2.2, 7 - w.bandits.strength*0.4 - level*0.15); }
  mana=Math.min(manaMax,mana+dt*7); if(fury>0)fury-=dt; if(invuln>0)invuln-=dt; if(toastT>0)toastT-=dt;
  for(const k in castCd) if(castCd[k]>0) castCd[k]-=dt;
  for(let i=hits.length-1;i>=0;i--){ hits[i].t-=dt; hits[i].pos.y+=dt*7; if(hits[i].t<=0) hits.splice(i,1); }
  const clear = enemies.every(e=>e.dying || hero.position.distanceTo(e.mesh.position)>16);
  if(heroHp<heroMax && clear) heroHp=Math.min(heroMax,heroHp+7*dt);
  const vc=new THREE.Vector3(SITES.village.pos[0],0,SITES.village.pos[2]);
  for(const e of enemies){
    if(!e.dying && e.hp<=0){ e.dying=0.45; gainXp(e.xpv); addPiety('kel', e.boss?2:0.25);   // Kel's respect is earned in blood
      { const bn=npcOf('slay'); if(bn){ bn.kills++; if(bn.kills>=bn.quest.n) completeNPC(bn); } }   // Bran's charge: slay the raiders
      if(e.boss){ w.bandits.strength=Math.max(0,w.bandits.strength-4); w.tension=Math.max(0,w.tension-40); toast="Kel's champion falls — the ridge holds its breath."; toastT=3.5; dropLoot(e.mesh.position); dropLoot(e.mesh.position); if(trialOn) endGame(true, covenant); }   // final trial won
      else if(Math.random()<0.42) dropLoot(e.mesh.position); }
    if(e.dying){ e.dying-=dt; e.mesh.scale.multiplyScalar(Math.max(0.01,1-3*dt)); if(e.dying<=0&&e.mesh.parent){ scene.remove(e.mesh); e.dead=true; } continue; }
    e.mesh.children.forEach(c=>c.material.emissive.setHex(e.hit>0?0xffffff:0x3a0d0d)); if(e.hit>0)e.hit-=dt; if(e.slow>0)e.slow-=dt;
    const dh=hero.position.distanceTo(e.mesh.position), tgt = dh<30 ? hero.position : vc;
    const dir=new THREE.Vector3(tgt.x-e.mesh.position.x,0,tgt.z-e.mesh.position.z), d=dir.length();
    if(d>3+e.r){ dir.normalize(); e.mesh.position.addScaledVector(dir,(e.slow>0?e.spd*0.4:e.spd)*dt); e.mesh.rotation.y=Math.atan2(dir.x,dir.z); }
    else { e.cool-=dt; if(e.cool<=0){ e.cool=1; if(tgt===hero.position){ if(invuln<=0){ heroHp-=e.dmg; heroFlash=0.16; } } else { w.village.food=Math.max(0,w.village.food-1); w.tension=Math.min(100,w.tension+0.6); } } }
  }
  enemies = enemies.filter(e=>!e.dead);
  // loot: bob, spin, auto-collect on touch — grain feeds the vale, relics buff the hero
  for(let i=loot.length-1;i>=0;i--){ const L=loot[i]; L.mesh.rotation.y+=dt*2.5; L.mesh.position.y=1.5+Math.sin(clock.elapsedTime*3+i)*0.3;
    if(hero.position.distanceTo(L.mesh.position)<3.2){
      if(L.kind==='grain'){ w.village.food+=4; toast='+4 grain for the vale'; }
      else { const r=Math.random(); if(r<0.34){heroDmg+=3;toast='relic — +3 damage';} else if(r<0.67){heroMax+=15;heroHp+=15;toast='relic — +15 max health';} else {manaMax+=15;mana+=15;toast='relic — +15 max mana';} }
      toastT=2.2; scene.remove(L.mesh); loot.splice(i,1); fx3(L.kind==='grain'?'#f59e0b':'#a78bfa'); AUDIO.sfx.pickup(); } }
  // death → respawn at the village with brief mercy
  if(heroHp<=0){ heroHp=heroMax; invuln=2.5; deaths++; hero.position.set(SITES.village.pos[0],0,SITES.village.pos[2]); w.village.morale=Math.max(0,w.village.morale-8); fx3('#7f1d1d'); AUDIO.sfx.death(); }
}

const keys = new Set();
addEventListener('keydown', e=>{ const k=e.key.toLowerCase(); AUDIO.ensure();
  if(!started){ if(['1','2','3','4'].includes(k)) startGame(DEITY_IDS[+k-1]); return; }   // calling screen
  if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)){keys.add(k);e.preventDefault();}
  if(k==='e') interact();
  if(k===' '){ heroAttack(); e.preventDefault(); }
  if(k==='shift'){ dodge(); e.preventDefault(); }  // roll
  if(KEYMAP[k]) cast(KEYMAP[k]);                 // Q/R/F/V → god-powers
  if(k==='c') showTree = !showTree;              // Covenant board
  if(k==='k') showChron = !showChron;            // Chronicle of the vale
  if(k==='m') AUDIO.toggleMute();                // mute
  if(['1','2','3','4'].includes(k)){ if(covenantOpen) chooseCovenant(+k-1); else if(shrineMenu) chooseOffer(+k-1); else if(pending&&!pending.result) accuse(+k-1); }
  if(k==='x'&&w.over) restart();                 // (R is a power key now)
});

function nearest(){ let best=null,bd=1e9; for(const [id,s] of Object.entries(SITES)){ const d=Math.hypot(hero.position.x-s.pos[0], hero.position.z-s.pos[2]); if(d<14 && d<bd){bd=d;best={id,s};} } return best; }
function nearestThing(){ let best=null,bd=1e9;   // NPC or site — whichever is closest wins the [E] key
  for(const n of NPCS){ if(!n.alive) continue; const d=Math.hypot(hero.position.x-n.pos[0], hero.position.z-n.pos[2]); if(d<11 && d<bd){bd=d; best={type:'npc', npc:n};} }
  for(const [id,s] of Object.entries(SITES)){ const d=Math.hypot(hero.position.x-s.pos[0], hero.position.z-s.pos[2]); if(d<14 && d<bd){bd=d; best={type:'site', id, s};} }
  return best; }
function interact(){ if(w.over||!started||covenantOpen) return;
  if(npcMenu){ npcMenu=null; return; }               // E closes an open conversation
  const t=nearestThing(); if(!t) return;
  if(t.type==='npc'){ talkTo(t.npc); return; }
  if(t.s.shrine){ shrineMenu=true; return; } doAct(t.s.act); }
function chooseOffer(i){ shrineMenu=false; doAct({action:'offer', deity:DEITY_IDS[i]}); }
function doAct(a){ shrineMenu=false; applyPlayerAction(w, a.action, a.deity);   // instant — no turn taken
  if(a.action==='tend_well'){ addPiety('vurm',0.5); if(crisis&&crisis.kind==='well') resolveCrisis(); completeNPC(npcOf('well')); }
  else if(a.action==='harvest'){ if(crisis&&crisis.kind==='fields') resolveCrisis(); else addPiety('vurm',0.3); }
  else if(a.action==='fortify'){ if(crisis&&crisis.kind==='wall') resolveCrisis(); else addPiety('kel',0.3); }
  else if(a.action==='rest'){ addPiety('oss',0.4); completeNPC(npcOf('mercy')); } }
function accuse(i){ if(!pending||pending.result) return; const guess=DEITY_IDS[i]; const ok=guess===pending.actual; reads.push({correct:ok});
  if(ok){ addPiety('ithra',1); if(crisis&&crisis.kind==='read') resolveCrisis(); completeNPC(npcOf('read')); }   // reading a god truly is Ithra's work
  pending={...pending,result:{guess,correct:ok}}; setTimeout(()=>{if(pending&&pending.result)pending=null;},2200); }
function restart(){
  for(const e of enemies) if(e.mesh.parent) scene.remove(e.mesh);
  for(const L of loot) if(L.mesh.parent) scene.remove(L.mesh);
  w=newWorld(); reads=[]; omen=null; pending=null; day=1; dayT=0; divPool=0;
  enemies=[]; loot=[]; hits=[]; toast=''; toastT=0; heroHp=100; heroMax=100; heroDmg=16; level=1; xp=0; points=1; deaths=0; fury=0;
  mana=60; manaMax=60; unlocked=new Set(['mend']); castCd={}; spawnT=4; invuln=0; showTree=false;
  covenant=null; covenantOpen=false; endKind=null; trialOn=false;
  started=false; calling=null; piety={vurm:0,kel:0,oss:0,ithra:0}; crisis=null; chronicle=[]; showChron=false; banner=null; bannerT=0;
  npcMenu=null; lostFolk=[]; npcPeril=[6,4,2];   // revive the named folk for a new tale
  for(const nn of NPCS){ nn.alive=true; nn.state='idle'; nn.talked=false; nn.kills=0; nn.mesh.position.set(nn.pos[0],0,nn.pos[2]); if(!nn.mesh.parent) scene.add(nn.mesh); }
  hero.position.set(SITES.village.pos[0],0,SITES.village.pos[2]);
}
window.__acc=accuse; window.restart=restart;

// ---- loop ----
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());
  // real-time flow: time passes and the gods act on their own — no turns taken (paused until you choose a calling)
  if(started && !w.over && !covenantOpen){                             // covenant modal freezes the world, like the calling screen
    dayT += dt;
    if(dayT >= DAY_SECS){ dayT = 0; upkeepTick(w); day++; w.turn = day;
      while(npcPeril.length && w.village.pop<=npcPeril[0]){ npcPeril.shift(); killNPC(); }   // the vale empties, and takes its folk
      if(w.village.pop <= 0){ endGame(false, 'fall'); } }
    divPool += dt * (0.5 + w.tension * 0.02);
    if(divPool >= 8 && !divBusy){ divPool = 0; divBusy = true;
      divineStrike(w, god)
        .then(act => { if(act){ omen = {text:act.omen, turn:act.turn}; pending = {idx:w.ledger.length-1, actual:act.deity}; AUDIO.sfx.omen(); onGodAct(act); } })
        .catch(e => console.warn('divineStrike failed:', e))
        .finally(() => { divBusy = false; }); }   // ALWAYS release — else a single throw silences the gods forever
  }
  // move (world-relative)
  if(dodgeCd>0) dodgeCd-=dt;
  if(dodgeT>0 && started && !w.over){ dodgeT-=dt; hero.position.x+=dodgeDir.x*62*dt; hero.position.z+=dodgeDir.z*62*dt; }
  else if(started && !busy && !w.over){ let dx=0,dz=0;
    if(keys.has('w')||keys.has('arrowup'))dz--; if(keys.has('s')||keys.has('arrowdown'))dz++;
    if(keys.has('a')||keys.has('arrowleft'))dx--; if(keys.has('d')||keys.has('arrowright'))dx++;
    if(dx||dz){ moveTarget=null; attackTarget=null; const m=Math.hypot(dx,dz); hero.position.x+=dx/m*26*dt; hero.position.z+=dz/m*26*dt; hero.rotation.y=Math.atan2(dx,dz); }   // WASD overrides click
    else if(attackTarget){                               // attack-move: close in, then strike on a cadence
      if(attackTarget.dying || attackTarget.hp<=0 || attackTarget.dead || !attackTarget.mesh.parent){ attackTarget=null; }
      else { const ddx=attackTarget.mesh.position.x-hero.position.x, ddz=attackTarget.mesh.position.z-hero.position.z, d=Math.hypot(ddx,ddz);
        hero.rotation.y=Math.atan2(ddx,ddz);
        if(d>7){ hero.position.x+=ddx/d*26*dt; hero.position.z+=ddz/d*26*dt; }
        atkTimer-=dt; if(d<=8 && atkTimer<=0){ heroAttack(); atkTimer=0.55; } } }
    else if(moveTarget){                                 // walk to the clicked point
      const ddx=moveTarget.x-hero.position.x, ddz=moveTarget.z-hero.position.z, d=Math.hypot(ddx,ddz);
      if(d>1.3){ hero.position.x+=ddx/d*26*dt; hero.position.z+=ddz/d*26*dt; hero.rotation.y=Math.atan2(ddx,ddz); } else moveTarget=null; } }
  hero.position.x=THREE.MathUtils.clamp(hero.position.x,-95,95); hero.position.z=THREE.MathUtils.clamp(hero.position.z,-90,90);
  if(npcMenu && (!npcMenu.alive || Math.hypot(hero.position.x-npcMenu.pos[0],hero.position.z-npcMenu.pos[2])>13)) npcMenu=null;   // walk away ends the talk
  if(marker && marker.visible){ marker.userData.t-=dt*0.8; marker.rotation.z+=dt*2.5; marker.material.opacity=Math.max(0,marker.userData.t); if(marker.userData.t<=0) marker.visible=false; }
  if(started && !w.over && !covenantOpen) updateCombat(dt);           // freeze combat under the covenant modal
  if(started && !w.over) storyTick();                                 // advance the emergent campaign
  if(bannerT>0) bannerT-=dt;                                          // title card fades
  AUDIO.setMode(enemies.some(e=>!e.dying) ? 'combat' : 'explore');   // score follows the danger
  if(fxT>0) fxT-=dt;
  if(heroFlash>0){ heroFlash-=dt; body.material.emissive.setHex(0xff5544); } else body.material.emissive.setHex(0x000000);
  // camera follows (behind + above)
  // third-person follow: trail behind the hero's facing
  const fwd = new THREE.Vector3(Math.sin(hero.rotation.y), 0, Math.cos(hero.rotation.y));
  const camPos = hero.position.clone().addScaledVector(fwd, -30).add(new THREE.Vector3(0, 22, 0));
  camera.position.lerp(camPos, 0.09);
  camera.lookAt(hero.position.x, 6, hero.position.z);
  // villagers as autonomous agents: a condition→action policy over the same world
  // the gods read — flee the ridge when war boils, seek the well when it thirsts,
  // else keep to home. Same "generate a lawful action from state" idea as the god.
  const flee = w.tension > 60, thirst = w.village.water <= 3;
  for (const vlg of villagers) {
    const mood = flee ? 'flee' : thirst ? 'thirst' : 'home';
    if (mood !== vlg.mood || !vlg.tgt || vlg.mesh.position.distanceTo(vlg.tgt) < 1.5) {
      vlg.mood = mood;
      if (flee)        vlg.tgt = new THREE.Vector3(8 + (Math.random()*24-12), 0, 42 + Math.random()*22);            // south, away from Kel's ridge
      else if (thirst) vlg.tgt = new THREE.Vector3(-55 + (Math.random()*10-5), 0, 12 + (Math.random()*10-5));       // to the well
      else             vlg.tgt = new THREE.Vector3(8 + Math.sin(clock.elapsedTime*1.3+vlg.seed)*10, 0, 8 + Math.cos(clock.elapsedTime*0.9+vlg.seed*2)*10);
    }
    const spd = flee ? 15 : thirst ? 9 : 6.5;
    const dir = vlg.tgt.clone().sub(vlg.mesh.position); dir.y = 0; const d = dir.length();
    if (d > 0.1) { dir.normalize(); vlg.mesh.position.addScaledVector(dir, spd*dt); vlg.mesh.rotation.y = Math.atan2(dir.x, dir.z); }
    vlg.mesh.children[0].material.emissive.setHex(flee ? 0x3a0d0d : 0x000000);   // fear tints them
  }
  // named folk: bob gently; glow amber when their god's crisis is upon them, green when their charge is met
  for(const n of NPCS){ if(!n.alive||!n.body) continue;
    const inPeril = crisis && crisis.god===n.god && !crisis.resolved;
    n.body.material.emissive.setHex(inPeril ? 0x5a3a0a : (n.state==='done' ? 0x0a2a12 : 0x000000));
    n.mesh.position.y = Math.sin(clock.elapsedTime*1.6 + n.pos[0]) * 0.12; }
  // tension → ember light + sky tint
  const t=w.tension/100; ember.intensity=t*2.4; scene.fog.color.setRGB(0.06+t*0.22,0.04,0.04); sky.material.uniforms.bot.value.setRGB(0.22+t*0.4,0.1,0.09);
  // billboards glow by wrath; ridge fires; well colour
  const anger=Object.fromEntries(ranking(w).map(r=>[r.deity,r.anger])); const maxA=Math.max(1,...Object.values(anger).map(Math.abs));
  for(const [id,s] of Object.entries(SITES)){ if(s.glow){ s.glow.intensity=0.4+1.6*THREE.MathUtils.clamp(anger[s.deity]/maxA,0,1); } if(s.deity&&billboards[id]) billboards[id].position.y=16+Math.sin(clock.elapsedTime*1.5+id.length)*0.6; }
  if(SITES.well.water) SITES.well.water.material.color.setHex(w.sites.well.clean?0x3b82c4:0x84812f);
  // ridge fires ~ bandits
  const fg=SITES.ridge.fireGrp; while(fg.children.length<w.bandits.strength){ const f=new THREE.Mesh(new THREE.ConeGeometry(0.8,2.4,6), new THREE.MeshStandardMaterial({color:0xf97316,emissive:0xf97316})); f.position.set(-8+fg.children.length*3,1.2,0); fg.add(f);} while(fg.children.length>w.bandits.strength) fg.remove(fg.children[fg.children.length-1]);
  if(SITES.shrine.monolith) SITES.shrine.monolith.visible=!w.sites.shrine.desecrated;
  renderer.render(scene, camera);
  drawUI();
}

   ${shrineMenu?`<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 border border-violet-900 bg-stone-950/95 rounded-lg p-4 text-center"><p class="serif text-lg text-violet-200 mb-2">At the shrine…</p><div class="flex gap-2">${DEITY_IDS.map((d,i)=>`<span class="mono text-[11px] px-3 py-2 rounded border border-stone-700"><b class="text-amber-300">${i+1}</b> ${PANTHEON[d].name.split(',')[0]}</span>`).join('')}</div><p class="mono text-[9px] text-stone-600 mt-2">press 1–4</p></div>`:''}
   ${npcMenu&&!w.over?`<div class="absolute left-1/2 bottom-24 -translate-x-1/2 w-[30rem] max-w-[92vw] pointer-events-auto"><div class="border rounded-lg bg-stone-950/95 p-4" style="border-color:${npcColorHex(npcMenu.color)}66"><div class="flex items-center gap-3 mb-2"><div class="w-9 h-9 rounded-full grid place-items-center serif text-lg" style="background:${npcColorHex(npcMenu.color)}22;color:${npcColorHex(npcMenu.color)}">${npcMenu.name[0]}</div><div><div class="serif text-lg text-stone-100 leading-none">${npcMenu.name}</div><div class="mono text-[9px] text-stone-500">${npcMenu.role}</div></div></div><p class="serif italic text-stone-200 text-[15px] leading-snug">“${npcLine(npcMenu)}”</p>${npcMenu.state==='active'?`<div class="mono text-[10px] text-amber-400 mt-2">◆ ${npcMenu.quest.desc}${npcMenu.quest.kind==='slay'?` (${Math.min(npcMenu.kills,npcMenu.quest.n)}/${npcMenu.quest.n})`:''}</div>`:npcMenu.state==='done'?`<div class="mono text-[10px] text-emerald-400 mt-2">✓ their charge is fulfilled</div>`:''}<div class="mono text-[9px] text-stone-600 mt-2 text-right">[E] leave</div></div></div>`:''}
   ${!npcMenu&&!shrineMenu&&near&&!busy&&!w.over?`<div class="absolute left-1/2 bottom-24 -translate-x-1/2 text-center"><span class="mono text-xs px-3 py-1.5 rounded-full bg-black/70 border border-stone-700 text-stone-200">${near.type==='npc'?`[E] speak with <span class="text-stone-100">${near.npc.name}</span> <span class="text-stone-500">· ${near.npc.role}</span>${near.npc.state==='active'?' <span class="text-amber-400">◆</span>':near.npc.state==='done'?' <span class="text-emerald-400">✓</span>':''}`:`[E] ${near.s.label} — <span class="text-stone-500">${near.s.name}</span>`}</span></div>`:''}
   ${!npcMenu&&!near&&!w.over?`<div class="absolute left-1/2 bottom-10 -translate-x-1/2 mono text-[10px] text-stone-600">left-click move · Space strike · SHIFT roll · E speak/act · K chronicle · seek the named folk of Aldermere</div>`:''}
   ${!started?`<div class="absolute inset-0 grid place-items-center bg-black/90 pointer-events-auto"><div class="text-center max-w-2xl px-6">
     <p class="serif text-5xl text-stone-100 tracking-[0.2em]">THEODICY</p>
     <p class="serif italic text-stone-400 mt-2">Aldermere lies under four gods. They act on it, unbidden; you endure — and answer.</p>
     <p class="mono text-[11px] uppercase tracking-[0.3em] text-amber-400 mt-6 mb-3">whom do you revere?&nbsp;&nbsp;[1–4]</p>
     <div class="flex flex-wrap gap-3 justify-center">${DEITY_IDS.map((d,i)=>`<button data-act="call:${d}" class="pointer-events-auto text-left w-52 p-3 rounded-lg border hover:bg-stone-900" style="border-color:${GODC[d]}66"><div class="mono text-xs mb-1" style="color:${GODC[d]}"><b class="text-amber-300">${i+1}</b> ${GNAME(d)} <span class="text-stone-500">· ${POWERS[CALLINGS[d].power].name}</span></div><div class="serif italic text-[12px] text-stone-400 leading-snug">${CALLINGS[d].blurb}</div></button>`).join('')}</div>
     <p class="mono text-[9px] text-stone-600 mt-6">left-click move · SPACE strike · SHIFT roll · Q/R/F/V powers · E act · K chronicle</p>
     <button data-act="mind" class="pointer-events-auto mono text-[10px] mt-4 px-3 py-1.5 rounded border ${godBackend==='supra'?'border-violet-700 text-violet-300':'border-stone-700 text-stone-500 hover:text-stone-300'}">${godLoading?`◍ waking ${godName}… ${godPct}%`:(godBackend==='supra'?`◈ the divine mind is awake (${godName})`:'◇ awaken the divine mind — a real LLM becomes the god (Qwen2.5-0.5B on WebGPU, ~480MB; else SmolLM2-360M)')}</button>
   </div></div>`:''}
   ${covenantOpen&&!w.over?`<div class="absolute inset-0 grid place-items-center bg-black/85 pointer-events-auto"><div class="text-center max-w-xl px-6"><p class="mono text-[10px] uppercase tracking-[0.35em] text-amber-400">The Covenant</p><p class="serif text-3xl text-stone-100 mt-3 mb-1">You have proven devotion. Pledge.</p><p class="serif italic text-stone-500 mb-5">Your patron grants their power — and their rival rises to test your oath.</p><div class="flex flex-wrap gap-2 justify-center">${DEITY_IDS.map((d,i)=>`<button data-act="cov:${i}" class="pointer-events-auto mono text-xs px-4 py-2.5 rounded border text-stone-200 hover:bg-stone-800" style="border-color:${GODC[d]}88"><b class="text-amber-300">${i+1}</b> ${GNAME(d)} <span class="text-stone-500">· ${POWERS[COV_POWER[d]].name} · devotion ${piety[d].toFixed(1)}</span></button>`).join('')}</div></div></div>`:''}
   ${showChron&&started?`<div class="absolute inset-0 bg-black/85 grid place-items-center pointer-events-auto p-6" data-act="chron"><div class="max-w-lg w-full border border-stone-800 rounded-lg bg-stone-950 p-5 max-h-[80vh] overflow-auto" data-act="stop"><div class="flex justify-between items-baseline mb-3"><h2 class="serif text-2xl text-stone-100">Chronicle of the Vale</h2><span class="mono text-[10px] text-stone-500">day ${day}</span></div>${chronicle.length?chronicle.map(r=>`<div class="border-b border-stone-900 py-1.5"><span class="mono text-[9px] uppercase" style="color:${GODC[r.god]}">${GNAME(r.god)} · ${r.verb}</span>${r.crisis?`<span class="mono text-[8px] ml-2 ${r.done?'text-emerald-400':'text-rose-400'}">${r.done?'answered':'unanswered'}</span>`:''}<div class="serif italic text-[12px] text-stone-300">“${r.omen||'—'}”</div></div>`).join(''):'<p class="serif italic text-stone-500">The gods have not yet moved.</p>'}<button data-act="chron" class="mt-3 mono text-xs px-4 py-2 rounded border border-stone-600 text-stone-200 hover:bg-stone-800">close ▸ (K)</button></div></div>`:''}
   ${omen?`<div class="absolute bottom-0 inset-x-0 px-6 pb-5 pt-10 bg-gradient-to-t from-black/95 to-transparent"><div class="max-w-2xl mx-auto text-center"><p class="serif italic text-stone-100 text-xl leading-snug">“${omen.text}”</p>${pending&&!pending.result?`<div class="mt-2 pointer-events-auto flex gap-2 justify-center items-center"><span class="mono text-[10px] uppercase tracking-widest text-amber-300/80">whose hand? 1–4</span>${DEITY_IDS.map((d,i)=>`<button data-act="acc:${i}" class="mono text-[11px] px-2 py-1 rounded border border-stone-700 text-stone-200 hover:bg-stone-800"><b class="text-amber-300">${i+1}</b> ${PANTHEON[d].name.split(',')[0]}</button>`).join('')}</div>`:pending&&pending.result?`<p class="mono text-[11px] mt-1 ${pending.result.correct?'text-emerald-400':'text-rose-400'}">${pending.result.correct?'✓ you knew the hand':'✗ it was '+PANTHEON[pending.actual].name.split(',')[0]}</p>`:''}</div></div>`:''}
   ${w.over?`<div class="absolute inset-0 grid place-items-center bg-black/85 pointer-events-auto"><div class="text-center max-w-xl px-6">
     <p class="mono text-[10px] uppercase tracking-[0.35em] ${w.won?'text-amber-400':'text-rose-400'}">${w.won?'The Tale Is Told':'The Vale Falls'}</p>
     <p class="serif text-4xl mt-3 ${w.won?'text-emerald-300':'text-rose-300'}">${w.won&&endKind&&PANTHEON[endKind]?PANTHEON[endKind].name.split(',')[0]+"'s Vale":'The vale is empty.'}</p>
     <p class="serif italic text-stone-300 mt-3 leading-snug">${w.won?(END_TEXT[endKind]||'The vale endures under your watch.'):'Aldermere starved before you could name a god to save it.'}</p>
     <p class="serif italic text-[13px] mt-3 leading-snug">${NPCS.filter(x=>x.alive).length?`<span class="text-stone-400">Still drawing breath:</span> <span class="text-emerald-300">${NPCS.filter(x=>x.alive).map(x=>x.name).join(', ')}</span>`:'<span class="text-rose-300">None of the named folk survived.</span>'}${lostFolk.length?` <span class="text-stone-500">·</span> <span class="text-rose-400">lost: ${lostFolk.join(', ')}</span>`:''}</p>
     <p class="mono text-[11px] text-stone-500 mt-3">level ${level} · fell ${deaths}× · ${day} days · read ${correct}/${reads.length} hands · ${NPCS.filter(x=>x.state==='done').length}/${NPCS.length} charges kept</p>
     <button data-act="restart" class="mt-5 mono text-sm px-4 py-2 rounded border border-stone-600 text-stone-200 hover:bg-stone-800">begin anew ▸ (X)</button></div></div>`:''}`;
}
animate();   // renders behind the calling screen; the world wakes when you choose a god
</script>
</body>
</html>
